<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Build Your Life</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --gold:#E8C97A; --gold-dark:#B8963A; --dark:#1A1410; }
body { background:#0d0d0d; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'DM Sans',sans-serif; overflow:hidden; }
#game { width:390px; height:844px; position:relative; overflow:hidden; background:#1a1008; border-radius:40px; box-shadow:0 0 80px rgba(232,201,122,0.15); }
#room { width:100%; height:100%; position:relative; }
#room-img { width:100%; height:100%; object-fit:cover; display:block; }
#overlay { position:absolute; inset:0; background:linear-gradient(to bottom,rgba(0,0,0,0.3) 0%,transparent 25%,transparent 70%,rgba(0,0,0,0.6) 100%); pointer-events:none; }
.anim-video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; pointer-events:none; z-index:8; opacity:0; }

/* HUD */
#hud { position:absolute; top:0; left:0; right:0; padding:20px 24px 16px; display:flex; justify-content:space-between; z-index:10; }
#money-label { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:rgba(232,201,122,0.7); margin-bottom:2px; }
#money-amount { font-family:'Bebas Neue',sans-serif; font-size:38px; color:var(--gold); line-height:1; text-shadow:0 0 20px rgba(232,201,122,0.4); transition:transform 0.1s; }
#money-amount.bump { transform:scale(1.15); }
#stage-label { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:2px; }
#stage-name { font-size:13px; font-weight:500; color:rgba(255,255,255,0.8); text-align:right; }

/* PROGRESS */
#progress-area { position:absolute; bottom:100px; left:24px; right:24px; z-index:10; }
#next-row { display:flex; justify-content:space-between; margin-bottom:8px; }
#next-name { font-size:12px; font-weight:600; color:#F5F0E8; }
#next-cost { font-family:'Bebas Neue',sans-serif; font-size:16px; color:var(--gold); }
#bar-bg { height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; }
#bar-fill { height:100%; background:linear-gradient(90deg,var(--gold-dark),var(--gold)); border-radius:3px; width:0%; transition:width 0.3s; box-shadow:0 0 8px rgba(232,201,122,0.5); }

/* TAP BTN */
#tap-area { position:absolute; bottom:20px; left:24px; right:24px; z-index:10; }
#tap-btn { width:100%; height:64px; background:linear-gradient(135deg,var(--gold-dark),var(--gold)); border:none; border-radius:20px; font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; color:var(--dark); cursor:pointer; box-shadow:0 4px 20px rgba(232,201,122,0.3); transition:transform 0.08s; }
#tap-btn:active { transform:scale(0.97) translateY(2px); }

/* RIPPLE & FLOAT */
.ripple { position:absolute; border-radius:50%; background:radial-gradient(circle,rgba(232,201,122,0.6) 0%,transparent 70%); pointer-events:none; animation:ripple-out 0.6s ease-out forwards; transform:translate(-50%,-50%); z-index:5; }
@keyframes ripple-out { 0%{width:0;height:0;opacity:1} 100%{width:120px;height:120px;opacity:0} }
.float-coin { position:absolute; font-family:'Bebas Neue',sans-serif; font-size:36px; color:var(--gold); pointer-events:none; text-shadow:0 0 16px rgba(232,201,122,1),0 2px 8px rgba(0,0,0,0.5); animation:float-up 1s ease-out forwards; z-index:20; }
@keyframes float-up { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(0.7)} }

/* SHAKE */
@keyframes shake { 0%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} 100%{transform:translateX(0)} }
#game.shake { animation:shake 0.12s ease-in-out; }

/* CARD */
#card-overlay { position:absolute; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s; }
#card-overlay.visible { opacity:1; pointer-events:all; }
#card-wrap { width:320px; position:relative; filter:drop-shadow(0 20px 40px rgba(0,0,0,0.5)); transform:scale(0.8); transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
#card-overlay.visible #card-wrap { transform:scale(1); }
#card-img { width:100%; display:block; border-radius:24px; }
#card-x { position:absolute; top:4%; right:4%; width:44px; height:44px; background:rgba(255,255,255,0.25); border-radius:50%; color:white; font-size:18px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:sans-serif; z-index:10; border:none; }

/* BRANCH TABS */
#branch-tabs { position:absolute; top:50%; right:-42px; transform:translateY(-50%); display:flex; flex-direction:column; gap:8px; z-index:10; }
.btab { width:40px; height:80px; background:rgba(20,12,4,0.85); border:1px solid rgba(232,201,122,0.2); border-radius:8px 0 0 8px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; }
.btab.active { background:rgba(232,201,122,0.15); border-color:rgba(232,201,122,0.5); }
.btab span { font-size:18px; }
.btab p { font-size:8px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,0.4); writing-mode:vertical-rl; transform:rotate(180deg); }
.btab.active p { color:var(--gold); }
.btab.locked { opacity:0.5; }

/* INVENTORY BUTTON */
#inv-btn {
  position:absolute; top:20px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.4); border:1px solid rgba(232,201,122,0.3);
  border-radius:20px; padding:6px 16px; color:rgba(232,201,122,0.8);
  font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600;
  letter-spacing:2px; text-transform:uppercase; cursor:pointer; z-index:15;
}

/* INVENTORY PANEL */
#inv-panel {
  position:absolute; inset:0; background:rgba(10,6,2,0.95);
  z-index:80; display:none; flex-direction:column; overflow-y:auto; padding:20px;
}
#inv-panel.open { display:flex; }
#inv-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
#inv-title { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--gold); letter-spacing:2px; }
#inv-close { background:rgba(255,255,255,0.1); border:none; border-radius:50%; width:36px; height:36px; color:white; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.inv-item { display:flex; gap:16px; align-items:center; padding:16px 0; border-bottom:1px solid rgba(255,255,255,0.08); }
.inv-item img { width:80px; flex-shrink:0; border-radius:12px; }
.inv-item-info { flex:1; }
.inv-item-name { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--gold); letter-spacing:1px; margin-bottom:4px; }
.inv-item-flavor { font-size:12px; font-style:italic; color:rgba(255,255,255,0.6); line-height:1.5; }
.inv-empty { text-align:center; color:rgba(255,255,255,0.3); font-size:14px; margin-top:100px; }
</style>
</head>
<body>
<div id="game">
  <div id="room">
    <img id="room-img" />
    <div id="overlay"></div>
    <video id="lightbulb-video" class="anim-video" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145917/LIGHTBULB_ANIMATION_sjsmtf.mp4" playsinline muted></video>
    <video id="mattress-video" class="anim-video" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145917/Matrress_ANIMATION_fnkj6c.mp4" playsinline muted></video>
    <video id="rug-video" class="anim-video" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145918/Rug_ANIMATION_qvcsz5.mp4" playsinline muted></video>
    <video id="chair-video" class="anim-video" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145916/Chair_ANIMATION_c0dps2.mp4" playsinline muted></video>
    <audio id="item-audio" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145018/item_sfx_pscuzu.mp3" preload="auto"></audio>
    <audio class="tap-pool" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145018/tap_sfx_p5tqww.mp3" preload="auto"></audio>
    <audio class="tap-pool" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145018/tap_sfx_p5tqww.mp3" preload="auto"></audio>
    <audio class="tap-pool" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145018/tap_sfx_p5tqww.mp3" preload="auto"></audio>
    <audio class="tap-pool" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145018/tap_sfx_p5tqww.mp3" preload="auto"></audio>
    <audio class="tap-pool" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145018/tap_sfx_p5tqww.mp3" preload="auto"></audio>
  </div>

  <div id="hud">
    <div>
      <div id="money-label">Taps</div>
      <div id="money-amount">0 / 30</div>
    </div>
    <div style="text-align:right">
      <div id="stage-label">Stage</div>
      <div id="stage-name">Empty Room</div>
    </div>
  </div>

  <button id="inv-btn">📦 Items</button>

  <div id="progress-area">
    <div id="next-row">
      <span id="next-name">Next: Lightbulb</span>
      <span id="next-cost">$11</span>
    </div>
    <div id="bar-bg"><div id="bar-fill"></div></div>
  </div>

  <div id="tap-area">
    <button id="tap-btn">TAP TO EARN</button>
  </div>

  <div id="branch-tabs">
    <div class="btab active"><span>🏠</span><p>Home</p></div>
    <div class="btab locked"><span>💼</span><p>Work</p></div>
    <div class="btab locked"><span>❤️</span><p>Love</p></div>
  </div>

  <div id="card-overlay">
    <div id="card-wrap">
      <img id="card-img" />
      <button id="card-x">✕</button>
    </div>
  </div>

  <div id="inv-panel">
    <div id="inv-header">
      <div id="inv-title">Your Life</div>
      <button id="inv-close">✕</button>
    </div>
    <div id="inv-list"></div>
  </div>
</div>

<script>
const stages=[
  {img:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778145087/Phase1_o6lp4q.jpg',name:'Empty Room',item:null,goal:0},
  {img:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778145087/Phase2_cljvub.jpg',name:'Let there be light',item:'Lightbulb',goal:30},
  {img:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778145087/phase3_r3rt69.jpg',name:'Something underfoot',item:'Flea Market Rug',goal:50},
  {img:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778145088/phase4_rphmbq.jpg',name:'Off the floor... sort of',item:'Secondhand Mattress',goal:100},
  {img:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778145088/phase5_m1bs9l.jpg',name:'Off the floor',item:'Wooden Chair',goal:150},
];

const ITEM_NAMES={1:'Lightbulb',2:'Flea Market Rug',3:'Secondhand Mattress',4:'Wooden Chair'};
const ITEM_FLAVORS={
  1:"Let there be light. He found the switch.",
  2:"The man said it belonged to a Turkish prince. I highly doubt that.",
  3:"Bed bugs aren't that bad. They are.",
  4:"If things get worse, this would be good for firewood."
};
const FLAVORS={
  1:'"Let there be light." — He found the switch.',
  2:'"The man said it belonged to a Turkish prince. I highly doubt that."',
  3:'"Bed bugs aren\'t that bad." — They are.',
  4:'"If things get worse, this would be good for firewood."'
};

let taps=0,stage=0,locked=false,unlockedItems=[];

const roomImg=document.getElementById('room-img');
const moneyEl=document.getElementById('money-amount');
const stageEl=document.getElementById('stage-name');
const nextName=document.getElementById('next-name');
const barFill=document.getElementById('bar-fill');
const cardImg=document.getElementById('card-img');
const lbVid=document.getElementById('lightbulb-video');
const rugVid=document.getElementById('rug-video');
const mattressVid=document.getElementById('mattress-video');
const chairVid=document.getElementById('chair-video');

roomImg.src=stages[0].img;

function refreshHUD(){
  const next=stage+1;
  if(next>=stages.length){
    document.getElementById('progress-area').style.display='none';
    document.getElementById('tap-area').style.display='none';
    return;
  }
  moneyEl.textContent=taps+' / '+stages[next].goal;
  stageEl.textContent=stages[stage].name;
  nextName.textContent='Next: '+stages[next].item;
  barFill.style.width=Math.min(taps/stages[next].goal,1)*100+'%';
}

function dismissCard(){
  if(window._ct) clearTimeout(window._ct);
  document.getElementById('card-overlay').classList.remove('visible');
}

function addToInventory(stageNum){
  unlockedItems.push(stageNum);
  renderInventory();
}

function renderInventory(){
  const list=document.getElementById('inv-list');
  if(unlockedItems.length===0){
    list.innerHTML='<div class="inv-empty">Nothing yet. Start tapping.</div>';
    return;
  }
  list.innerHTML=unlockedItems.map(s=>`
    <div class="inv-item">
      <div style="width:80px;height:60px;background:rgba(232,201,122,0.1);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">${['💡','🪵','🛏️','🪑'][s-1]||'📦'}</div>
      <div class="inv-item-info">
        <div class="inv-item-name">${ITEM_NAMES[s]||'Item'}</div>
        <div class="inv-item-flavor">${ITEM_FLAVORS[s]||''}</div>
      </div>
    </div>
  `).join('');
}

function showCard(){
  locked=false; taps=0;
  addToInventory(stage);
  refreshHUD();
  playCardSound();
}

document.getElementById('card-x').addEventListener('click',e=>{e.stopPropagation();dismissCard();});
document.getElementById('card-x').addEventListener('touchstart',e=>{e.stopPropagation();dismissCard();},{passive:false});

function playAnim(vid,newStage,base){
  if(base!==undefined) roomImg.src=stages[base].img;
  vid.currentTime=0; vid.style.opacity='1'; vid.play().catch(()=>{});
  playUnlockSound();
  let done=false;
  function finish(){if(done)return;done=true;stage=newStage;roomImg.src=stages[stage].img;setTimeout(()=>{vid.style.opacity='0';showCard();},80);}
  vid.onended=finish; setTimeout(finish,5000);
}

function advance(){
  locked=true; taps=0; moneyEl.textContent=''; barFill.style.width='100%'; dismissCard();
  if(stage===0){
    lbVid.currentTime=0;lbVid.style.opacity='1';lbVid.play().catch(()=>{});
    playUnlockSound();
    let done=false;
    function lbDone(){if(done)return;done=true;stage=1;roomImg.src=stages[1].img;setTimeout(()=>{lbVid.style.opacity='0';showCard();},80);}
    lbVid.onended=lbDone; setTimeout(lbDone,5000);
  }
  else if(stage===1) playAnim(rugVid,2,1);
  else if(stage===2) playAnim(mattressVid,3,2);
  else if(stage===3) playAnim(chairVid,4,3);
  else {stage++;roomImg.src=stages[stage].img;showCard();}
}

function handleTap(e){
  if(locked)return;
  e.preventDefault();
  const rect=document.getElementById('game').getBoundingClientRect();
  const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
  taps+=1;
  moneyEl.classList.remove('bump');void moneyEl.offsetWidth;moneyEl.classList.add('bump');
  setTimeout(()=>moneyEl.classList.remove('bump'),100);
  const r=document.createElement('div');r.className='ripple';r.style.left=x+'px';r.style.top=y+'px';
  document.getElementById('game').appendChild(r);setTimeout(()=>r.remove(),600);
  const f=document.createElement('div');f.className='float-coin';f.textContent='+1';
  f.style.left=(x-20)+'px';f.style.top=(y-20)+'px';
  document.getElementById('game').appendChild(f);setTimeout(()=>f.remove(),1000);
  playTapSound();
  const g=document.getElementById('game');g.classList.remove('shake');void g.offsetWidth;g.classList.add('shake');setTimeout(()=>g.classList.remove('shake'),120);
  const next=stage+1;
  if(next<stages.length&&taps>=stages[next].goal) advance();
  else refreshHUD();
}

document.getElementById('tap-btn').addEventListener('click',handleTap);
document.getElementById('tap-btn').addEventListener('touchstart',handleTap,{passive:false});
document.getElementById('room').addEventListener('click',handleTap);
document.getElementById('room').addEventListener('touchstart',handleTap,{passive:false});

document.getElementById('inv-btn').addEventListener('click',()=>{renderInventory();document.getElementById('inv-panel').classList.add('open');});
document.getElementById('inv-close').addEventListener('click',()=>{document.getElementById('inv-panel').classList.remove('open');});

let _tapIdx=0;
const _tapPool=()=>document.querySelectorAll('.tap-pool');
function playTapSound(){try{
  const pool=_tapPool();
  const a=pool[_tapIdx%pool.length];
  _tapIdx++;
  a.currentTime=0;
  a.play().catch(()=>{});
}catch(e){}}
function playUnlockSound(){try{
  const a=document.getElementById('item-audio');
  a.currentTime=0;
  a.play().catch(()=>{});
}catch(e){}}
function playCardSound(){}

refreshHUD();
renderInventory();
</script>
</body>
</html>
