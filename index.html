<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Build Your Life</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --gold:#E8C97A; --gold-dark:#B8963A; --dark:#1A1410; }
body { background:#0d0d0d; margin:0; padding:0; font-family:'DM Sans',sans-serif; overflow:hidden; width:100vw; height:100vh; height:100dvh; }
#game { width:100vw; height:100vh; height:100dvh; position:relative; overflow:hidden; background:#1a1008; }

/* ROOM */
#room { width:100%; height:100%; position:relative; }
.room-bg { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 0.4s ease; }
.room-bg.active { opacity:1; }
#overlay { position:absolute; inset:0; background:linear-gradient(to bottom,rgba(0,0,0,0.3) 0%,transparent 25%,transparent 70%,rgba(0,0,0,0.6) 100%); pointer-events:none; z-index:2; }
.anim-video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; pointer-events:none; z-index:8; opacity:0; transition:opacity 0.3s ease; }

/* HUD */
#hud { position:absolute; top:0; left:0; right:0; padding:20px 24px 16px; display:flex; justify-content:space-between; z-index:10; }
#money-label { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:rgba(232,201,122,0.7); margin-bottom:2px; }
#money-amount { font-family:'Bebas Neue',sans-serif; font-size:38px; color:var(--gold); line-height:1; text-shadow:0 0 20px rgba(232,201,122,0.4); transition:transform 0.1s; }
#money-amount.bump { transform:scale(1.15); }
#stage-label { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:2px; }
#stage-name { font-size:13px; font-weight:500; color:rgba(255,255,255,0.8); text-align:right; transition:color 0.3s; }
#stage-name.can-afford { color:var(--gold); animation:pulse-gold 1.5s ease-in-out infinite; }
#stage-name.can-afford-enter { animation:can-afford-pop 0.5s ease-out forwards; }
@keyframes pulse-gold { 0%,100%{opacity:1} 50%{opacity:0.6} }
@keyframes can-afford-pop { 0%{transform:scale(1) rotate(0deg)} 20%{transform:scale(1.2) rotate(-3deg)} 40%{transform:scale(1.2) rotate(3deg)} 60%{transform:scale(1.1) rotate(-2deg)} 80%{transform:scale(1.05) rotate(1deg)} 100%{transform:scale(1) rotate(0deg)} }

/* TAP AREA */
#tap-area { display:none; }
#tap-btn { width:100%; height:64px; background:linear-gradient(135deg,var(--gold-dark),var(--gold)); border:none; border-radius:20px; font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; color:var(--dark); cursor:pointer; box-shadow:0 4px 20px rgba(232,201,122,0.3); transition:transform 0.08s; }
#tap-btn:active { transform:scale(0.97) translateY(2px); }

/* RIPPLE & FLOAT */
.ripple { position:absolute; border-radius:50%; background:radial-gradient(circle,rgba(232,201,122,0.6) 0%,transparent 70%); pointer-events:none; animation:ripple-out 0.6s ease-out forwards; transform:translate(-50%,-50%); z-index:5; }
@keyframes ripple-out { 0%{width:0;height:0;opacity:1} 100%{width:120px;height:120px;opacity:0} }
.float-coin { position:absolute; font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--gold); pointer-events:none; text-shadow:0 0 16px rgba(232,201,122,1); animation:float-up 1s ease-out forwards; z-index:20; }
@keyframes float-up { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(0.7)} }
@keyframes shake { 0%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} 100%{transform:translateX(0)} }
#game.shake { animation:shake 0.12s ease-in-out; }

/* BRANCH TABS */
#branch-tabs {
  position:absolute; bottom:0; left:0; right:0;
  height:80px;
  display:flex; flex-direction:row;
  background:rgba(8,4,2,0.96);
  border-top:1px solid rgba(232,201,122,0.12);
  z-index:20;
  backdrop-filter:blur(10px);
}
.btab {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:5px;
  cursor:pointer;
  position:relative;
  transition:background 0.2s;
}
.btab::before {
  content:'';
  position:absolute; top:0; left:20%; right:20%;
  height:2px;
  background:var(--gold);
  border-radius:0 0 3px 3px;
  opacity:0;
  transition:opacity 0.2s;
}
.btab.active::before { opacity:1; }
.btab-icon {
  width:44px; height:44px;
  background:rgba(255,255,255,0.04);
  border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px;
  transition:background 0.2s, transform 0.15s;
  border:1px solid rgba(255,255,255,0.06);
}
.btab.active .btab-icon {
  background:rgba(232,201,122,0.12);
  border-color:rgba(232,201,122,0.3);
  transform:translateY(-2px);
}
.btab p {
  font-size:9px; font-weight:600; letter-spacing:1.5px;
  text-transform:uppercase; color:rgba(255,255,255,0.3);
  writing-mode:horizontal-tb; transform:none;
}
.btab.active p { color:var(--gold); }
.btab.locked { opacity:0.3; pointer-events:none; }

/* STORE SCREEN */
#store-screen {
  position:absolute; inset:0; z-index:15;
  background:rgba(10,6,2,0.97);
  display:flex; flex-direction:column;
  padding:0;
  transform:translateX(100%);
  transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
#store-screen.open { transform:translateX(0); }
#store-header { padding:52px 24px 20px; border-bottom:1px solid rgba(255,255,255,0.06); }
#store-title { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--gold); letter-spacing:2px; }
#store-balance { font-size:13px; color:rgba(255,255,255,0.5); margin-top:4px; }
#store-balance span { color:var(--gold); font-weight:600; }
#store-list { flex:1; overflow-y:auto; padding:16px 24px; }
.store-item {
  display:flex; align-items:center; gap:16px;
  padding:16px 0; border-bottom:1px solid rgba(255,255,255,0.06);
}
.store-item-icon { width:56px; height:56px; background:rgba(232,201,122,0.08); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; border:1px solid rgba(232,201,122,0.15); }
.store-item-info { flex:1; }
.store-item-name { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--gold); letter-spacing:1px; }
.store-item-desc { font-size:11px; color:rgba(255,255,255,0.4); margin-top:2px; }
.store-item-owned { font-size:11px; color:rgba(232,201,122,0.5); margin-top:2px; font-style:italic; }
.buy-btn {
  flex-shrink:0;
  background:linear-gradient(135deg,var(--gold-dark),var(--gold));
  border:none; border-radius:12px;
  padding:10px 14px;
  font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:1px;
  color:var(--dark); cursor:pointer;
  transition:transform 0.08s, opacity 0.2s;
}
.buy-btn:active { transform:scale(0.95); }
.buy-btn.cant-afford { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.3); cursor:default; }
.buy-btn.owned { background:rgba(232,201,122,0.1); color:rgba(232,201,122,0.4); cursor:default; font-size:12px; }

/* INVENTORY SCREEN */
#inv-screen {
  position:absolute; inset:0; z-index:15;
  background:rgba(10,6,2,0.97);
  display:flex; flex-direction:column;
  transform:translateX(100%);
  transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
#inv-screen.open { transform:translateX(0); }
#inv-header { padding:52px 24px 20px; border-bottom:1px solid rgba(255,255,255,0.06); }
#inv-title { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--gold); letter-spacing:2px; }
#inv-list { flex:1; overflow-y:auto; padding:16px 24px; }
.inv-item { display:flex; gap:16px; align-items:center; padding:16px 0; border-bottom:1px solid rgba(255,255,255,0.08); }
.inv-item-icon { width:56px; height:56px; background:rgba(232,201,122,0.08); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; }
.inv-item-info { flex:1; }
.inv-item-name { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--gold); letter-spacing:1px; margin-bottom:4px; }
.inv-item-flavor { font-size:12px; font-style:italic; color:rgba(255,255,255,0.5); line-height:1.5; }
.inv-empty { text-align:center; color:rgba(255,255,255,0.3); font-size:14px; margin-top:100px; }

/* PURCHASE FLASH */
#purchase-flash {
  position:absolute; inset:0; z-index:25;
  background:rgba(232,201,122,0.15);
  opacity:0; pointer-events:none;
  transition:opacity 0.15s;
}
#purchase-flash.show { opacity:1; }

/* CARD OVERLAY */
#card-overlay { position:absolute; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s; }
#card-overlay.visible { opacity:1; pointer-events:all; }
#card-wrap { width:320px; position:relative; filter:drop-shadow(0 20px 40px rgba(0,0,0,0.5)); transform:scale(0.8); transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
#card-overlay.visible #card-wrap { transform:scale(1); }
#card-img { width:100%; display:block; border-radius:24px; }
#card-x { position:absolute; top:4%; right:4%; width:44px; height:44px; background:rgba(255,255,255,0.25); border-radius:50%; color:white; font-size:18px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; border:none; }
</style>
</head>
<body>
<div id="game">

  <!-- ROOM -->
  <div id="room">
    <img class="room-bg active" src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778150289/Phase1fix2_oeniq8.jpg" />

    <img class="room-bg" src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778145088/phase4_rphmbq.jpg" />

    <video id="rug-video" class="anim-video" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145918/Rug_ANIMATION_qvcsz5.mp4" playsinline muted></video>
    <video id="chair-video" class="anim-video" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145916/Chair_ANIMATION_c0dps2.mp4" playsinline muted></video>
    <audio id="item-audio" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145018/item_sfx_pscuzu.mp3" preload="auto"></audio>

    <audio class="tap-pool" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145018/tap_sfx_p5tqww.mp3" preload="auto"></audio>
    <audio class="tap-pool" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145018/tap_sfx_p5tqww.mp3" preload="auto"></audio>
    <audio class="tap-pool" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145018/tap_sfx_p5tqww.mp3" preload="auto"></audio>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div><div id="money-label">Money</div><div id="money-amount">$0</div></div>
    <div style="text-align:right"><div id="stage-label">Next Item</div><div id="stage-name">Lightbulb · $200</div></div>
  </div>

  <!-- TAP BUTTON -->
  

  <!-- BRANCH TABS -->
  <div id="branch-tabs">
    <div class="btab active" data-tab="home">
      <div class="btab-icon">🏠</div>
      <p>Home</p>
    </div>
    <div class="btab" data-tab="store">
      <div class="btab-icon">🛒</div>
      <p>Store</p>
    </div>
    <div class="btab" data-tab="inv">
      <div class="btab-icon">📦</div>
      <p>Items</p>
    </div>
  </div>

  <!-- STORE SCREEN -->
  <div id="store-screen">
    <div id="store-header">
      <div id="store-title">Store</div>
      <div id="store-balance">Balance: <span id="store-balance-amount">$0</span></div>
    </div>
    <div id="store-list"></div>
  </div>

  <!-- INVENTORY SCREEN -->
  <div id="inv-screen">
    <div id="inv-header">
      <div id="inv-title">Your Life</div>
    </div>
    <div id="inv-list"></div>
  </div>

  <!-- PURCHASE FLASH -->
  <div id="purchase-flash"></div>

  <!-- CARD OVERLAY -->
  <div id="card-overlay"><div id="card-wrap"><img id="card-img" /><button id="card-x">✕</button></div></div>

</div>

<script>
const ITEMS = [
  { id:1, name:'Lightbulb',          emoji:'💡', desc:'Let there be light',        price:200, stage:1, vid:'lightbulb', flavor:"Let there be light. He found the switch." },
  { id:2, name:'Flea Market Rug',    emoji:'🪵', desc:'Something underfoot',        price:500, stage:2, vid:'rug',       flavor:"The man said it belonged to a Turkish prince. I highly doubt that." },
  { id:3, name:'Secondhand Mattress',emoji:'🛏️', desc:'Off the floor... sort of',   price:900, stage:3, vid:'mattress',  flavor:"Bed bugs aren't that bad. They are." },
  { id:4, name:'Wooden Chair',       emoji:'🪑', desc:'Off the floor',             price:1500, stage:4, vid:'chair',    flavor:"If things get worse, this would be good for firewood." },
];

const stages = [
  { name:'Empty Room' },
  { name:'Let there be light' },
  { name:'Something underfoot' },
  { name:'Off the floor... sort of' },
  { name:'Off the floor' },
];

const bgs       = document.querySelectorAll('.room-bg');
const moneyEl   = document.getElementById('money-amount');
const stageEl   = document.getElementById('stage-name');
const lbVid     = document.getElementById('lightbulb-video');
const rugVid    = document.getElementById('rug-video');
const mattVid   = document.getElementById('mattress-video');
const chairVid  = document.getElementById('chair-video');
const flash     = document.getElementById('purchase-flash');

const VIDS = { lightbulb:lbVid, rug:rugVid, mattress:mattVid, chair:chairVid };

let money = 0;
let stage = 0;
let locked = false;
let owned = [];
let activeTab = 'home';

function showBg(i) {
  bgs.forEach((el,j) => el.classList.toggle('active', j===i));
}

function fmt(n) { return '$' + n.toLocaleString(); }

function updateMoneyDisplay() {
  moneyEl.textContent = fmt(money);
  document.getElementById('store-balance-amount').textContent = fmt(money);
}

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.btab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('store-screen').classList.toggle('open', tab === 'store');
  document.getElementById('inv-screen').classList.toggle('open', tab === 'inv');
  document.getElementById('tap-area').style.display = tab === 'home' ? '' : 'none';
  if(tab === 'store') renderStore();
  if(tab === 'inv') renderInv();
}

document.querySelectorAll('.btab').forEach(b => {
  b.addEventListener('click', () => setTab(b.dataset.tab));
});

function renderStore() {
  const list = document.getElementById('store-list');
  list.innerHTML = ITEMS.map(item => {
    const isOwned = owned.includes(item.id);
    const canAfford = money >= item.price;
    const btnClass = isOwned ? 'owned' : canAfford ? '' : 'cant-afford';
    const btnText = isOwned ? '✓ Owned' : fmt(item.price);
    return `<div class="store-item">
      <div class="store-item-icon">${item.emoji}</div>
      <div class="store-item-info">
        <div class="store-item-name">${item.name}</div>
        ${isOwned
          ? `<div class="store-item-owned">Already in your room</div>`
          : `<div class="store-item-desc">${item.desc}</div>`}
      </div>
      <button class="buy-btn ${btnClass}" ${isOwned || !canAfford ? 'disabled' : ''} onclick="buyItem(${item.id})">${btnText}</button>
    </div>`;
  }).join('');
}

function renderInv() {
  const list = document.getElementById('inv-list');
  if(!owned.length) { list.innerHTML='<div class="inv-empty">Nothing yet. Buy something from the store.</div>'; return; }
  list.innerHTML = owned.map(id => {
    const item = ITEMS.find(i=>i.id===id);
    return `<div class="inv-item">
      <div class="inv-item-icon">${item.emoji}</div>
      <div class="inv-item-info">
        <div class="inv-item-name">${item.name}</div>
        <div class="inv-item-flavor">${item.flavor}</div>
      </div>
    </div>`;
  }).join('');
}

function buyItem(id) {
  const item = ITEMS.find(i=>i.id===id);
  if(!item || owned.includes(id) || money < item.price || locked) return;
  money -= item.price;
  owned.push(id);
  updateMoneyDisplay();
  const nextItem = ITEMS[stage];
  const couldAfford = stageEl.classList.contains("can-afford");
  const nowCanAfford = nextItem && money >= nextItem.price;
  if(!couldAfford && nowCanAfford){
    stageEl.classList.add("can-afford","can-afford-enter");
    setTimeout(()=>stageEl.classList.remove("can-afford-enter"),500);
  } else if(!nowCanAfford) stageEl.classList.remove("can-afford");
  else stageEl.classList.remove("can-afford");

  // Flash feedback
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 200);

  // Switch to home and play animation
  setTimeout(() => {
    setTab('home');
    setTimeout(() => playAnim(item), 400);
  }, 300);
}

function playAnim(item) {
  locked = true;
  const vid = VIDS[item.vid];
  if(!vid) { stage = item.stage; showBg(stage); stageEl.textContent = ITEMS[stage] ? ITEMS[stage].name + " · $" + ITEMS[stage].price.toLocaleString() : "Complete!"; locked=false; return; }
  vid.currentTime = 0;
  vid.style.opacity = '1';
  vid.play().catch(()=>{});
  playUnlockSound();
  let done = false;
  function finish() {
    if(done) return; done = true;
    stage = item.stage;
    showBg(stage);
    stageEl.textContent = ITEMS[stage] ? ITEMS[stage].name + " · $" + ITEMS[stage].price.toLocaleString() : "Complete!";
    setTimeout(() => { vid.style.opacity='0'; locked=false; }, 400);
  }
  vid.onended = finish;
  setTimeout(finish, 6000);
}

function handleTap(e) {
  if(locked || activeTab !== 'home') return;
  e.preventDefault();
  const rect = document.getElementById('game').getBoundingClientRect();
  const x = (e.touches?e.touches[0].clientX:e.clientX) - rect.left;
  const y = (e.touches?e.touches[0].clientY:e.clientY) - rect.top;

  const earned = 1 + Math.floor(stage * 0.5); // earn more as you progress
  money += earned;
  updateMoneyDisplay();
  const nextItem = ITEMS[stage];
  const couldAfford = stageEl.classList.contains("can-afford");
  const nowCanAfford = nextItem && money >= nextItem.price;
  if(!couldAfford && nowCanAfford){
    stageEl.classList.add("can-afford","can-afford-enter");
    setTimeout(()=>stageEl.classList.remove("can-afford-enter"),500);
  } else if(!nowCanAfford) stageEl.classList.remove("can-afford");
  else stageEl.classList.remove("can-afford");

  moneyEl.classList.remove('bump'); void moneyEl.offsetWidth; moneyEl.classList.add('bump');
  setTimeout(()=>moneyEl.classList.remove('bump'),100);

  const r=document.createElement('div');r.className='ripple';r.style.left=x+'px';r.style.top=y+'px';
  document.getElementById('game').appendChild(r);setTimeout(()=>r.remove(),600);

  const f=document.createElement('div');f.className='float-coin';f.textContent='+'+fmt(earned);
  f.style.left=(x-20)+'px';f.style.top=(y-40)+'px';
  document.getElementById('game').appendChild(f);setTimeout(()=>f.remove(),1000);

  playTapSound();
  
}



document.getElementById('room').addEventListener('click',handleTap);
document.getElementById('room').addEventListener('touchstart',handleTap,{passive:false});
document.getElementById('card-x').addEventListener('click',e=>{e.stopPropagation();document.getElementById('card-overlay').classList.remove('visible');});

let _tapIdx=0;
function playTapSound(){try{const pool=document.querySelectorAll('.tap-pool');const a=pool[_tapIdx%pool.length];_tapIdx++;a.currentTime=0;a.play().catch(()=>{});}catch(e){}}
function playUnlockSound(){try{const a=document.getElementById('item-audio');a.currentTime=0;a.play().catch(()=>{});}catch(e){}}

updateMoneyDisplay();
  const nextItem = ITEMS[stage];
  const couldAfford = stageEl.classList.contains("can-afford");
  const nowCanAfford = nextItem && money >= nextItem.price;
  if(!couldAfford && nowCanAfford){
    stageEl.classList.add("can-afford","can-afford-enter");
    setTimeout(()=>stageEl.classList.remove("can-afford-enter"),500);
  } else if(!nowCanAfford) stageEl.classList.remove("can-afford");
  else stageEl.classList.remove("can-afford");
</script>


</body>
</html>
