<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Build Your Life</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
:root { --gold:#E8C97A; --gold-dark:#B8963A; --dark:#1A1410; }
body { background:#0d0d0d; font-family:'DM Sans',sans-serif; overflow:hidden; }
#game { width:100vw; height:100vh; height:100dvh; position:relative; overflow:hidden; }

/* SPLASH SCREEN */
#splash { position:absolute; inset:0; z-index:500; cursor:pointer; }
#splash img { width:100%; height:100%; object-fit:cover; }

/* SCREENS */
.screen { position:absolute; inset:0; }
.bg { position:absolute; inset:0; object-fit:cover; width:100%; height:100%; }

/* HOME ITEMS */
.room-item { position:absolute; inset:0; object-fit:cover; width:100%; height:100%; pointer-events:none; opacity:0; }
.room-item.visible { opacity:1; }

/* WORK ITEMS */
.work-item { position:absolute; inset:0; object-fit:cover; width:100%; height:100%; pointer-events:none; opacity:0; }
.work-item.visible { opacity:1; }

/* ANIMATION VIDEO */
#anim-video { position:absolute; inset:0; object-fit:cover; width:100%; height:100%; pointer-events:none; z-index:50; display:none; }

/* HUD */
#hud { position:absolute; top:0; left:0; right:0; padding:20px 24px; display:flex; justify-content:space-between; z-index:100; pointer-events:none; transition:opacity 0.2s; }
#money-label { font-size:11px; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:#2d5a27; }
#money-amount { font-family:'Bebas Neue',sans-serif; font-size:40px; color:#2d5a27; line-height:1; }
#money-amount.bump { transform:scale(1.15); transition:transform 0.05s; }
#next-label { font-size:11px; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:#2d5a27; text-align:right; }
#next-name { font-size:15px; font-weight:700; color:#2d5a27; text-align:right; }
#next-name.can-afford { animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* RIPPLE & FLOAT */
.ripple { position:absolute; border-radius:50%; background:radial-gradient(circle,rgba(232,201,122,0.5),transparent 70%); pointer-events:none; animation:rout 0.6s ease-out forwards; transform:translate(-50%,-50%); z-index:60; }
@keyframes rout { 0%{width:0;height:0;opacity:1} 100%{width:120px;height:120px;opacity:0} }
.fcoin { position:absolute; font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--gold); pointer-events:none; animation:fup 1s ease-out forwards; z-index:60; text-shadow:0 0 16px rgba(232,201,122,1); }
@keyframes fup { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-80px)} }

/* TABS */
#tabs { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); display:flex; gap:16px; z-index:200; }
.tab { width:70px; height:70px; cursor:pointer; }
.tab img { width:100%; height:100%; object-fit:contain; }

/* STORE */
#store { position:absolute; inset:0; z-index:150; background:rgba(10,6,2,0.97); display:none; flex-direction:column; transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); }
#store-head { padding:52px 20px 14px; border-bottom:1px solid rgba(255,255,255,0.06); }
#store-title { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--gold); letter-spacing:2px; }
#store-bal { font-size:13px; color:rgba(255,255,255,0.5); margin-top:4px; }
#store-bal span { color:var(--gold); font-weight:600; }
#store-tab-btns { display:flex; gap:8px; margin-top:10px; }
#store-tab-btns button { flex:1; padding:7px; border-radius:8px; border:none; font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:1px; cursor:pointer; }
#store-list { flex:1; overflow-y:auto; padding:12px 20px 120px; }
.si { display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
.si-icon { width:52px; height:52px; background:rgba(232,201,122,0.08); border-radius:12px; border:1px solid rgba(232,201,122,0.15); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.si-icon img { width:100%; height:100%; object-fit:contain; }
.si-info { flex:1; }
.si-name { font-family:'Bebas Neue',sans-serif; font-size:17px; color:var(--gold); letter-spacing:1px; }
.si-desc { font-size:11px; color:rgba(255,255,255,0.4); margin-top:2px; }
.si-owned { font-size:11px; color:rgba(232,201,122,0.5); margin-top:2px; font-style:italic; }
.bbtn { flex-shrink:0; background:linear-gradient(135deg,var(--gold-dark),var(--gold)); border:none; border-radius:10px; padding:9px 12px; font-family:'Bebas Neue',sans-serif; font-size:14px; color:var(--dark); cursor:pointer; letter-spacing:1px; }
.bbtn.no { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.3); cursor:default; }
.bbtn.owned { background:rgba(232,201,122,0.1); color:rgba(232,201,122,0.4); cursor:default; font-size:11px; }
.mystery { opacity:0.4; pointer-events:none; }
audio { display:none; }
</style>
</head>

<script>
// ============================================
// HOME ITEMS
// ============================================
const ITEMS = [
  { id:1,  name:'Flea Market Rug',  price:5,  el:'item-rug',          anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778836625/Rug_u93giu.webm',        icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778836317/Rug_wbkm6v.png',           flavor:'The man said it belonged to a Turkish prince. I highly doubt that.' },
  { id:2,  name:'Wooden Chair',     price:10, el:'item-chair',        anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778761056/Chair_tzdheg.webm',                                                                                   icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/Chair_smvy1g.png',         flavor:'My grandad used to say a chair is a man\u2019s best friend.' },

  { id:7,  name:'Bed Sheets',       price:35, el:'item-mattresscover',anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617403/Bed_Sheets_lobhbr.webm',icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611447/Matress_cover_e4wxba.png', flavor:'Clean sheets. Small win. Still counts.' },
  { id:8,  name:'Wall Clock',       price:40, el:'item-clock',        anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617403/Clock_kor6d5.webm',     icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/Clock_thciwf.png',         flavor:'Time is passing. Might as well know how much.' },
  { id:9,  name:'Coffee Table',     price:45, el:'item-table',        anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617405/Table_gljcgx.webm',     icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/Table_gsyqnd.png',         flavor:'A surface. Finally a surface.' },
  { id:10, name:'Curtains',         price:50, el:'item-curtains',     anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617404/Curtains_c5rjoc.webm',  icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/Curtains_wg66ly.png',      flavor:'Finally. Some privacy.' },

  { id:13, name:'Old TV',           price:65, el:'item-tv',           anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617405/TV_pkofmb.webm',        icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/TV_zaylil.png',            flavor:'Three channels. One of them is static. He loves it.' },

// ============================================
// WORK ITEMS
// ============================================
const WORK_ITEMS = [
  { id:'w1', name:'Desk Lamp',           price:5,  el:'witem-lamp',   passive:0.20, tap:0,    anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778758678/Desk_Lamp_gfphua.webm',                icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778757828/Desk_Lamp_gnh2gy.png',           flavor:'Finally some light in this place.' },
  { id:'w2', name:'Coffee Mug',          price:10, el:'witem-mug',    passive:0.40, tap:0,    anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778758349/Coffee_Mug_odjn7n.webm',               icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778757827/Coffee_Mug_ttuqbq.png',           flavor:'His name on it. Nobody touches it.' },

  { id:'w4', name:'Calculator',          price:20, el:'witem-calc',   passive:0,    tap:0.10, anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778758349/calculator_irbfgu.webm',               icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778757827/Calculator_xovff8.png',           flavor:'The numbers are starting to make sense.' },
  { id:'w5', name:'Pen Cup',             price:25, el:'witem-pen',    passive:0.80, tap:0,    anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778758349/Pen_Cup_sy2m3b.webm',                  icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778757828/Pen_Cup_k0ikuu.png',              flavor:'He has seven pens. Uses one.' },
  { id:'w6', name:'Motivational Poster', price:30, el:'witem-poster', passive:0,    tap:0.20, anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778758349/Motivational_Poster_hxkjsa.webm',      icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778757828/Motivational_Poster_hhmcsz.png', flavor:'\u201cBelieve in yourself.\u201d He does now.' },
];

// Preload all anims
[...ITEMS, ...WORK_ITEMS].forEach(item => {
  if (!item.anim) return;
  const v = document.createElement('video');
  v.src = item.anim; v.preload = 'auto'; v.muted = true; v.style.display = 'none';
  document.body.appendChild(v);
});

// ============================================
// STATE
// ============================================
let money = 0;
let owned = [];
let workOwned = [];
let tab = 'work';
let storeTab = 'home';
let animLocked = false;
let tapMultiplier = 1.0;
let passivePerMin = 0;
let typingTimer = null;
let isTyping = false;
let tapIdx = 0;

const moneyEl   = document.getElementById('money-amount');
const animVid   = document.getElementById('anim-video');
const animVidW  = document.getElementById('anim-video-work');
const workSleep = document.getElementById('work-sleep');
const workType  = document.getElementById('work-type');

// ============================================
// PASSIVE INCOME
// ============================================
setInterval(() => {
  if (passivePerMin > 0) {
    money = Math.round((money + passivePerMin / 60) * 100) / 100;
    updateMoney();
    updateNext();
  }
}, 1000);

function recalcWork() {
  tapMultiplier = 1.0;
  passivePerMin = 0;
  workOwned.forEach(id => {
    const item = WORK_ITEMS.find(i => i.id === id);
    if (!item) return;
    tapMultiplier += item.tap;
    passivePerMin += item.passive;
  });
}

// ============================================
// SPLASH
// ============================================
function startGame() {
  const splash = document.getElementById('splash');
  splash.style.transition = 'transform 0.4s ease';
  splash.style.transform = 'translateX(-100%)';
  setTimeout(() => splash.style.display = 'none', 400);
}

// ============================================
// MONEY
// ============================================
function fmt(n) { return '$' + n.toFixed(2); }

function updateMoney() {
  moneyEl.textContent = fmt(money);
  document.getElementById('store-bal-amt').textContent = fmt(money);
}

function updateNext() {} // removed - using status label instead

// ============================================
// BUY HOME ITEM
// ============================================
function buyItem(id) {
  const item = ITEMS.find(i => i.id === id);
  if (!item || owned.includes(id) || money < item.price || animLocked) return;
  money -= item.price;
  owned.push(id);
  updateMoney();
  setTab('home');
  playSnd('snd-item');

  if (!item.anim) {
    document.getElementById(item.el).classList.add('visible');
    updateNext();
    return;
  }

  animLocked = true;
  animVid.style.zIndex = (item.id >= 14) ? '50' : '12';
  animVid.onended = null;
  animVid.src = item.anim;
  animVid.style.display = 'block';
  animVid.currentTime = 0;
  animVid.play().catch(() => {});
  animVid.onended = () => {
    requestAnimationFrame(() => {
      animVid.style.display = 'none';
      animVid.src = '';
      document.getElementById(item.el).classList.add('visible');
      animLocked = false;
      updateNext();
      if (tab === 'store') renderStore();
    });
  };
}

// ============================================
// BUY WORK ITEM
// ============================================
function buyWorkItem(id) {
  const item = WORK_ITEMS.find(i => i.id === id);
  if (!item || workOwned.includes(id) || money < item.price || animLocked) return;
  money -= item.price;
  workOwned.push(id);
  recalcWork();
  updateMoney();
  setTab('work');
  playSnd('snd-item');

  if (item.anim) {
    animLocked = true;
    animVidW.style.display = 'block';
    animVidW.src = item.anim;
    animVidW.currentTime = 0;
    animVidW.play().catch(() => {});
    animVidW.onended = () => {
      requestAnimationFrame(() => {
        animVidW.style.display = 'none';
        animVidW.src = '';
        // Show item AFTER animation ends
        document.getElementById(item.el).classList.add('visible');
        animLocked = false;
        if (tab === 'store') renderStore();
      });
    };
  } else {
    document.getElementById(item.el).classList.add('visible');
  }
}

// ============================================
// STORE
// ============================================
function setStoreTab(t) {
  storeTab = t;
  document.getElementById('stab-home').style.cssText = `flex:1;padding:7px;border-radius:8px;border:none;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer;background:${t==='home'?'var(--gold)':'rgba(255,255,255,0.08)'};color:${t==='home'?'#1A1410':'rgba(255,255,255,0.4)'}`;
  document.getElementById('stab-work').style.cssText = `flex:1;padding:7px;border-radius:8px;border:none;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer;background:${t==='work'?'var(--gold)':'rgba(255,255,255,0.08)'};color:${t==='work'?'#1A1410':'rgba(255,255,255,0.4)'}`;
  renderStore();
}

function renderStore() {
  const list = document.getElementById('store-list');

  if (storeTab === 'work') {
    const nextIdx = WORK_ITEMS.findIndex(i => !workOwned.includes(i.id));
    const show = new Set(workOwned);
    for (let i = 0; i < 4; i++) { if (nextIdx !== -1 && WORK_ITEMS[nextIdx+i]) show.add(WORK_ITEMS[nextIdx+i].id); }
    let html = WORK_ITEMS.filter(i => show.has(i.id)).map(item => {
      const isOwned = workOwned.includes(item.id);
      const can = money >= item.price;
      const bc = isOwned ? 'owned' : can ? '' : 'no';
      const bt = isOwned ? '\u2713 Owned' : fmt(item.price);
      const eff = item.passive > 0 ? '+$'+item.passive.toFixed(2)+'/min' : item.tap > 0 ? '+'+(item.tap*100)+'% tap' : '';
      return `<div class="si">
        <div class="si-icon"><img src="${item.icon}"/></div>
        <div class="si-info">
          <div class="si-name">${item.name}</div>
          ${isOwned ? `<div class="si-owned">${eff} — active</div>` : `<div class="si-desc">${item.flavor}<br><span style="color:var(--gold);font-size:11px;">${eff}</span></div>`}
        </div>
        <button class="bbtn ${bc}" ${isOwned||!can?'disabled':''} onclick="buyWorkItem('${item.id}')">${bt}</button>
      </div>`;
    }).join('');
    const hs = nextIdx !== -1 ? nextIdx+4 : WORK_ITEMS.length;
    WORK_ITEMS.slice(hs, hs+2).forEach(() => {
      html += `<div class="si mystery"><div class="si-icon" style="font-size:22px;color:rgba(232,201,122,0.3)">?</div><div class="si-info"><div class="si-name" style="color:rgba(232,201,122,0.4);font-style:italic">???</div><div class="si-desc">Keep building</div></div><div style="font-size:22px">\uD83D\uDD12</div></div>`;
    });
    list.innerHTML = html;
    return;
  }

  const nextIdx = ITEMS.findIndex(i => !owned.includes(i.id));
  const show = new Set(owned);
  for (let i = 0; i < 4; i++) { if (nextIdx !== -1 && ITEMS[nextIdx+i]) show.add(ITEMS[nextIdx+i].id); }
  let html = ITEMS.filter(i => show.has(i.id)).map(item => {
    const isOwned = owned.includes(item.id);
    const can = money >= item.price;
    const bc = isOwned ? 'owned' : can ? '' : 'no';
    const bt = isOwned ? '\u2713 Owned' : fmt(item.price);
    return `<div class="si">
      <div class="si-icon"><img src="${item.icon}"/></div>
      <div class="si-info">
        <div class="si-name">${item.name}</div>
        ${isOwned ? '<div class="si-owned">In your room</div>' : `<div class="si-desc">${item.flavor}</div>`}
      </div>
      <button class="bbtn ${bc}" ${isOwned||!can?'disabled':''} onclick="buyItem(${item.id})">${bt}</button>
    </div>`;
  }).join('');
  const hs = nextIdx !== -1 ? nextIdx+4 : ITEMS.length;
  ITEMS.slice(hs, hs+2).forEach(() => {
    html += `<div class="si mystery"><div class="si-icon" style="font-size:22px;color:rgba(232,201,122,0.3)">?</div><div class="si-info"><div class="si-name" style="color:rgba(232,201,122,0.4);font-style:italic">???</div><div class="si-desc">Keep building</div></div><div style="font-size:22px">\uD83D\uDD12</div></div>`;
  });
  list.innerHTML = html;
}

// ============================================
// TABS
// ============================================
let prevTab = 'work';

function setTab(t) {
  prevTab = tab;
  tab = t;
  const isStore = t === 'store';
  const isWork  = t === 'work';
  const isHome  = t === 'home';

  // Home and work screens — swap only when not going to store
  if (!isStore) {
    document.getElementById('home-screen').style.display = isWork ? 'none' : 'block';
    document.getElementById('work-screen').style.display = isWork ? 'block' : 'none';
  }

  // Store — show/hide with slide from correct direction
  const storeEl = document.getElementById('store');
  if (isStore) {
    storeEl.style.display = 'flex';
    storeEl.style.transition = 'none';
    storeEl.style.transform = prevTab === 'work' ? 'translateX(-100%)' : 'translateX(100%)';
    requestAnimationFrame(() => {
      storeEl.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
      storeEl.style.transform = 'translateX(0)';
    });
  } else {
    storeEl.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
    storeEl.style.transform = tab === 'work' ? 'translateX(-100%)' : 'translateX(100%)';
    setTimeout(() => { storeEl.style.display = 'none'; }, 300);
  }

  // Work character
  if (!isWork) {
    if (typingTimer) clearTimeout(typingTimer);
    isTyping = false;
    workSleep.style.display = 'block';
    workType.style.display = 'none';
  }

  // Update status label based on tab
  const statusEl = document.getElementById('status-label');
  if (statusEl) {
    if (isWork) statusEl.textContent = 'Entry Level';
    else if (isHome) statusEl.textContent = 'One Bedroom Apartment';
  }

  // HUD
  document.getElementById('hud').style.opacity = isStore ? '0' : '1';

  if (isStore) renderStore();
}

document.getElementById('tab-home').addEventListener('click', () => { playSnd('snd-tab'); setTab('home'); });
document.getElementById('tab-store').addEventListener('click', () => { playSnd('snd-tab'); setTab('store'); });
document.getElementById('tab-work').addEventListener('click', () => { playSnd('snd-tab'); setTab('work'); });

// ============================================
// WORK CHARACTER
// ============================================
function startTyping() {
  if (!isTyping) {
    isTyping = true;
    workSleep.style.display = 'none';
    workType.style.display = 'block';
  }
  if (typingTimer) clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {
    isTyping = false;
    workSleep.style.display = 'block';
    workType.style.display = 'none';
  }, 800);
}

// ============================================
// SOUNDS
// ============================================
function playSnd(id) {
  try { const a = document.getElementById(id); a.currentTime = 0; a.play().catch(() => {}); } catch(e) {}
}
function playTap() {
  try { const pool = document.querySelectorAll('.tap-snd'); const a = pool[tapIdx++ % pool.length]; a.currentTime = 0; a.play().catch(() => {}); } catch(e) {}
}

// ============================================
// EARN
// ============================================
let prevMoney = 0;
function earn(x, y) {
  const before = money;
  money = Math.round((money + 0.1 * tapMultiplier) * 100) / 100;
  updateMoney();
  ITEMS.forEach(item => {
    
  });

  moneyEl.classList.remove('bump'); void moneyEl.offsetWidth; moneyEl.classList.add('bump');
  setTimeout(() => moneyEl.classList.remove('bump'), 100);

  const r = document.createElement('div'); r.className = 'ripple';
  r.style.left = x + 'px'; r.style.top = y + 'px';
  document.getElementById('game').appendChild(r); setTimeout(() => r.remove(), 600);

  const f = document.createElement('div'); f.className = 'fcoin';
  f.textContent = '+$' + (0.1 * tapMultiplier).toFixed(2);
  f.style.left = (x-20) + 'px'; f.style.top = (y-40) + 'px';
  document.getElementById('game').appendChild(f); setTimeout(() => f.remove(), 1000);

  playTap();
  if (tab === 'work') startTyping();
}

// ============================================
// TOUCH — tap on work screen only
// ============================================
document.getElementById('work-screen').addEventListener('touchstart', e => {
  if (tab !== 'work') return;
  e.preventDefault();
  const rect = document.getElementById('game').getBoundingClientRect();
  const t = e.touches[0];
  earn(t.clientX - rect.left, t.clientY - rect.top);
}, { passive: false });

document.getElementById('work-screen').addEventListener('click', e => {
  if (tab !== 'work') return;
  const rect = document.getElementById('game').getBoundingClientRect();
  earn(e.clientX - rect.left, e.clientY - rect.top);
});

// ============================================
// INIT
// ============================================
updateMoney();
updateNext();
</script>
</body>
</html>
