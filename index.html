<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Build Your Life</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
:root { --gold:#E8C97A; --gold-dark:#B8963A; --dark:#1A1410; }
body { background:#0d0d0d; font-family:'DM Sans',sans-serif; overflow:hidden; }
#game { width:100vw; height:100vh; height:100dvh; position:relative; overflow:hidden; }

/* SPLASH SCREEN */
#splash { position:absolute; inset:0; z-index:500; cursor:pointer; }
#splash img { width:100%; height:100%; object-fit:cover; }

/* SCREENS */
.screen { position:absolute; inset:0; }
.bg { position:absolute; inset:0; object-fit:cover; width:100%; height:100%; }

/* HOME ITEMS */
.room-item { position:absolute; inset:0; object-fit:cover; width:100%; height:100%; pointer-events:none; opacity:0; }
.room-item.visible { opacity:1; }

/* WORK ITEMS */
.work-item { position:absolute; inset:0; object-fit:cover; width:100%; height:100%; pointer-events:none; opacity:0; }
.work-item.visible { opacity:1; }

/* ANIMATION VIDEO */
#anim-video { position:absolute; inset:0; object-fit:cover; width:100%; height:100%; pointer-events:none; z-index:50; display:none; }

/* HUD */
#hud { position:absolute; top:0; left:0; right:0; padding:20px 24px; display:flex; justify-content:space-between; z-index:100; pointer-events:none; transition:opacity 0.2s; }
#money-label { font-size:9px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#2d5a27; }
#money-amount { font-family:'Bebas Neue',sans-serif; font-size:28px; color:#2d5a27; line-height:1; }
#money-amount.bump { transform:scale(1.15); transition:transform 0.05s; }
#next-label { font-size:11px; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:#2d5a27; text-align:right; }
#next-name { font-size:15px; font-weight:700; color:#2d5a27; text-align:right; }
#next-name.can-afford { animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* RIPPLE & FLOAT */
.ripple { position:absolute; border-radius:50%; background:radial-gradient(circle,rgba(232,201,122,0.5),transparent 70%); pointer-events:none; animation:rout 0.6s ease-out forwards; transform:translate(-50%,-50%); z-index:60; }
@keyframes rout { 0%{width:0;height:0;opacity:1} 100%{width:120px;height:120px;opacity:0} }
.fcoin { position:absolute; font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--gold); pointer-events:none; z-index:60; text-shadow:0 0 16px rgba(232,201,122,1); }

/* Tier 0: under $100 - normal */
.fcoin-tier-0 { font-size:22px; animation:fup 1s ease-out forwards; }
/* Tier 1: $100-$10K - slightly bigger */
.fcoin-tier-1 { font-size:30px; animation:fup 1.2s ease-out forwards; text-shadow:0 0 20px rgba(232,201,122,1); }
/* Tier 2: $10K-$1M - clearly bigger, brighter */
.fcoin-tier-2 { font-size:40px; animation:fupBig 1.4s ease-out forwards; text-shadow:0 0 24px rgba(255,220,120,1), 0 0 40px rgba(232,201,122,0.6); font-weight:bold; }
/* Tier 3: $1M-$100M - huge with double-shadow glow */
.fcoin-tier-3 { font-size:52px; animation:fupBig 1.6s ease-out forwards; text-shadow:0 0 28px rgba(255,235,150,1), 0 0 56px rgba(255,200,80,0.8); color:#ffe48a; font-weight:bold; letter-spacing:1px; }
/* Tier 4: $100M+ - max impact */
.fcoin-tier-4 { font-size:64px; animation:fupBig 1.8s ease-out forwards; text-shadow:0 0 32px rgba(255,245,180,1), 0 0 72px rgba(255,180,50,1), 0 0 96px rgba(255,120,30,0.5); color:#fff2a8; font-weight:bold; letter-spacing:2px; }

@keyframes fupBig { 
  0%   { transform:translateY(0) scale(0.6); opacity:0; }
  15%  { transform:translateY(-10px) scale(1.15); opacity:1; }
  85%  { transform:translateY(-90px) scale(1); opacity:1; }
  100% { transform:translateY(-120px) scale(0.95); opacity:0; }
}
@keyframes fup { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-80px)} }

/* TABS */
#tabs { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); display:flex; gap:16px; z-index:200; }
.tab { width:70px; height:70px; cursor:pointer; }
.tab img { width:100%; height:100%; object-fit:contain; }

/* STORE */
#store { position:absolute; inset:0; z-index:150; background:rgba(10,6,2,0.97); display:none; flex-direction:column; transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); }
#store-head { padding:52px 20px 14px; border-bottom:1px solid rgba(255,255,255,0.06); }
#store-title { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--gold); letter-spacing:2px; }
#store-bal { font-size:13px; color:rgba(255,255,255,0.5); margin-top:4px; }
#store-bal span { color:var(--gold); font-weight:600; }
#store-tab-btns { display:flex; gap:8px; margin-top:10px; }
#store-tab-btns button { flex:1; padding:7px; border-radius:8px; border:none; font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:1px; cursor:pointer; }
#store-list { flex:1; overflow-y:auto; padding:12px 20px 120px; }
.si { display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
.si-icon { width:52px; height:52px; background:rgba(232,201,122,0.08); border-radius:12px; border:1px solid rgba(232,201,122,0.15); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.si-icon img { width:100%; height:100%; object-fit:contain; }
.si-info { flex:1; }
.si-name { font-family:'Bebas Neue',sans-serif; font-size:17px; color:var(--gold); letter-spacing:1px; }
.si-desc { font-size:11px; color:rgba(255,255,255,0.4); margin-top:2px; }
.si-owned { font-size:11px; color:rgba(232,201,122,0.5); margin-top:2px; font-style:italic; }
.bbtn { flex-shrink:0; background:linear-gradient(135deg,var(--gold-dark),var(--gold)); border:none; border-radius:10px; padding:9px 12px; font-family:'Bebas Neue',sans-serif; font-size:14px; color:var(--dark); cursor:pointer; letter-spacing:1px; }
.bbtn.no { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.3); cursor:default; }
.bbtn.owned { background:rgba(232,201,122,0.1); color:rgba(232,201,122,0.4); cursor:default; font-size:11px; }
.mystery { opacity:0.4; pointer-events:none; }
.progress-wrap { width:100%; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; margin-top:6px; overflow:hidden; }
.progress-wrap { position:relative; }
.progress-bar { height:100%; background:linear-gradient(90deg,var(--gold-dark),var(--gold)); border-radius:3px; transition:width 0.05s linear; width:0%; position:relative; }
.progress-bar.active { 
  background:linear-gradient(90deg,#4a9e3f,#7dd674,#c8f5a0,#7dd674,#4a9e3f);
  background-size:200% 100%;
  animation:shimmer 0.6s linear infinite, glow-pulse 0.4s ease-in-out infinite alternate;
  box-shadow: 0 0 8px 2px rgba(100,220,80,0.8), 0 0 20px 4px rgba(100,220,80,0.4);
}
@keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
@keyframes glow-pulse { 0%{box-shadow:0 0 6px 2px rgba(100,220,80,0.6),0 0 14px 3px rgba(100,220,80,0.3)} 100%{box-shadow:0 0 12px 4px rgba(100,220,80,1),0 0 28px 8px rgba(100,220,80,0.6)} }
.progress-wrap { height:8px; border-radius:4px; }
.hold-btn { flex-shrink:0; background:linear-gradient(135deg,var(--gold-dark),var(--gold)); border:none; border-radius:10px; padding:9px 12px; font-family:'Bebas Neue',sans-serif; font-size:14px; color:var(--dark); cursor:pointer; letter-spacing:1px; touch-action:none; -webkit-user-select:none; min-width:78px; text-align:center; }
.hold-btn.no { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.3); cursor:default; }
.hold-btn.owned { background:rgba(232,201,122,0.1); color:rgba(232,201,122,0.4); cursor:default; font-size:11px; }
audio { display:none; }

/* OFFLINE EARNINGS MODAL */
#offline-modal {
  position:absolute; inset:0; z-index:400;
  background:rgba(10,6,2,0.88);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  animation:offlineFade 0.3s ease;
}
@keyframes offlineFade { 0%{opacity:0} 100%{opacity:1} }
.offline-card {
  background:linear-gradient(180deg, rgba(232,201,122,0.10), rgba(26,20,16,0.95));
  border:1px solid rgba(232,201,122,0.3);
  border-radius:16px;
  padding:36px 44px;
  text-align:center;
  max-width:80%;
  animation:offlineCardIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes offlineCardIn { 0%{transform:scale(0.85);opacity:0} 100%{transform:scale(1);opacity:1} }
.offline-tagline {
  font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px;
  color:rgba(232,201,122,0.75); margin-bottom:14px;
}
.offline-amount {
  font-family:'Bebas Neue',sans-serif; font-size:56px;
  color:var(--gold); text-shadow:0 0 24px rgba(232,201,122,0.6);
  line-height:1; margin-bottom:10px;
}
.offline-sub {
  font-size:13px; color:rgba(255,255,255,0.55); margin-bottom:26px;
  font-style:italic;
}
.offline-tap {
  font-size:10px; letter-spacing:3px; color:rgba(232,201,122,0.5);
}

/* DEV: Reset progress button (remove before launch) */
#dev-reset-btn {
  position:absolute; top:62px; right:24px; z-index:90;

  padding:4px 10px;
  background:rgba(180,30,30,0.85); color:#fff;
  border:1px solid rgba(255,180,180,0.3); border-radius:6px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
}
#dev-reset-btn:active { transform:scale(0.94); }
</style>

// SAVE / LOAD SYSTEM
// ============================================
const SAVE_KEY = 'nobody_save';
const GAME_VERSION = '3.0.0';

// When true, all save operations are suppressed. Used during wipeSave to prevent
// beforeunload/visibilitychange from re-saving state during the reload.
let isWiping = false;

// Offline earnings tuning
const OFFLINE_MULTIPLIER = 0.5;    // earn 50% of online rate while away
const OFFLINE_CAP_HOURS  = 8;      // max hours of offline earnings
const OFFLINE_MODAL_MIN  = 50;     // only show modal if earned at least this much

// Set by loadGame() if there are earnings to celebrate after splash
let pendingOfflineEarnings = 0;
let pendingOfflineSeconds  = 0;

function saveGame() {
  if (isWiping) return;
  try {
    const state = {
      meta: {
        version: GAME_VERSION,
        lastSaved: Date.now(),
      },
      economy: {
        money: money,
      },
      inventory: {
        home: { owned: owned, progress: itemProgress },
        work: { owned: workOwned },
      },
      boosts: {
        active: activeBoosts,
        cooldowns: boostCooldowns,
      },
      ui: {
        tab: tab,
        storeTab: storeTab,
      },
      progression: {
        // reserved for future: level, totalEarned, totalTaps, reputation, prestige, etc.
      },
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn('Save failed:', e);
  }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false; // first-time player, nothing to load
    const state = JSON.parse(raw);

    if (state.meta && state.meta.version !== GAME_VERSION) {
      console.warn('Save version mismatch:', state.meta.version, 'vs', GAME_VERSION, '- wiping old save for fresh start');
      localStorage.removeItem(SAVE_KEY);
      return false;
    }

    // Restore primitive state
    money      = (state.economy && state.economy.money) || 0;
    owned      = (state.inventory && state.inventory.home && state.inventory.home.owned) || [];
    workOwned  = (state.inventory && state.inventory.work && state.inventory.work.owned) || [];
    itemProgress   = (state.inventory && state.inventory.home && state.inventory.home.progress) || {};
    // Safety: strip any legacy -1 markers from old saves (would lock items forever)
    Object.keys(itemProgress).forEach(k => {
      if (itemProgress[k] === -1 || itemProgress[k] < 0) delete itemProgress[k];
    });
    activeBoosts   = (state.boosts && state.boosts.active) || {};
    boostCooldowns = (state.boosts && state.boosts.cooldowns) || {};

    // Restore visible state: show owned home items
    owned.forEach(id => {
      const item = ITEMS.find(i => i.id === id || String(i.id) === String(id));
      if (!item) return;
      const el = document.getElementById(item.el);
      if (el) el.classList.add('visible');
      if (item.replaces) {
        const rep = document.getElementById(item.replaces);
        if (rep) rep.classList.remove('visible');
      }
    });

    // Restore visible state: show owned work items
    workOwned.forEach(id => {
      const item = WORK_ITEMS.find(i => String(i.id) === String(id));
      if (!item) return;
      const el = document.getElementById(item.el);
      if (el) el.classList.add('visible');
    });

    // Recalculate passive income and tap multiplier from owned work items
    recalcWork();

    // Offline earnings: award money for time elapsed since last save
    // Uses base passive rate only - boosts do NOT accumulate offline
    const lastSaved = (state.meta && state.meta.lastSaved) || 0;
    if (lastSaved > 0 && passivePerMin > 0) {
      const elapsedSec = Math.max(0, (Date.now() - lastSaved) / 1000);
      const cappedSec  = Math.min(elapsedSec, OFFLINE_CAP_HOURS * 3600);
      const earned     = (passivePerMin / 60) * cappedSec * OFFLINE_MULTIPLIER;
      if (earned > 0.01) {
        money = Math.round((money + earned) * 100) / 100;
        if (earned >= OFFLINE_MODAL_MIN) {
          pendingOfflineEarnings = Math.round(earned * 100) / 100;
          pendingOfflineSeconds  = cappedSec;
        }
      }
    }

    // Clean up expired boosts; restart timeouts for still-active ones
    const now = Date.now();
    Object.keys(activeBoosts).forEach(id => {
      if (activeBoosts[id] <= now) {
        delete activeBoosts[id];
      } else {
        const remaining = activeBoosts[id] - now;
        setTimeout(() => {
          delete activeBoosts[id];
          recalcBoosts();
          if (tab === 'store') renderStore();
        }, remaining);
      }
    });
    recalcBoosts();

    // Restore which tab the player was on
    if (state.ui && state.ui.tab) {
      tab = state.ui.tab;
      storeTab = state.ui.storeTab || 'home';
    }

    updateMoney();
    return true;
  } catch (e) {
    console.warn('Load failed:', e);
    return false;
  }
}

  localStorage.removeItem(SAVE_KEY);

    if (earned < 0.01) return;
    money = Math.round((money + earned) * 100) / 100;

    if (earned >= OFFLINE_MODAL_MIN) {

// Idle-game number formatting: cents under $1K, K/M/B/T notation above.
// Examples: $0.10, $5.50, $999.99, $1.23K, $45.67M, $1.23B
function fmt(n) {
  if (typeof n !== 'number' || !isFinite(n)) return '$0.00';
  if (n < 0) return '-' + fmt(-n);
  if (n < 1000) return '$' + n.toFixed(2);
  const suffixes = ['', 'K', 'M', 'B', 'T', 'Qa', 'Qi', 'Sx', 'Sp', 'Oc', 'No', 'Dc'];
  let tier = Math.floor(Math.log10(n) / 3);
  if (tier >= suffixes.length) return '$' + n.toExponential(2);
  let scaled = n / Math.pow(10, tier * 3);
  // Boundary fix: if rounding to 2 decimals would push us to 1000.00, bump up a tier
  if (scaled.toFixed(2) === '1000.00' && tier + 1 < suffixes.length) {
    tier += 1;
    scaled = n / Math.pow(10, tier * 3);
  }
  return '$' + scaled.toFixed(2) + suffixes[tier];
}

function holdStart(id, type) {
  if (holdIntervals[id]) return;

  const items = type === 'home' ? ITEMS : WORK_ITEMS;
  const item = items.find(i => String(i.id) === String(id));
  if (!item) return;

  const ownedList = type === 'home' ? owned : workOwned;
  if (ownedList.map(String).includes(String(id))) return;

  // Safety: clean up any legacy -1 markers
  if (itemProgress[String(id)] === -1) itemProgress[String(id)] = 0;

  // Already fully paid (queued from previous press blocked by animLocked)? Try buy.
  const currentProg = itemProgress[String(id)] || 0;
  if (currentProg >= item.price) {
    if (!animLocked) {
      playSnd('snd-bought');
      if (type === 'home') buyItem(id, true);
      else buyWorkItem(id, true);
    }
    // If animLocked, processBuyQueue will pick this up when the anim ends
    return;
  }

  // Visual + sound feedback
  const bar = document.getElementById('bar-' + id);
  if (bar && money > 0) bar.classList.add('active');
  if (money > 0) {
    try { const a = document.getElementById('snd-accumulate'); a.currentTime=0; a.play().catch(()=>{}); } catch(e) {}
  }

  holdIntervals[id] = setInterval(() => {
    // Already owned (e.g. processBuyQueue completed it)? Stop.
    if (ownedList.map(String).includes(String(id))) { holdEnd(id); return; }

    const prog = itemProgress[String(id)] || 0;
    const remaining = item.price - prog;

    // Bar complete - attempt buy
    if (remaining <= 0) {
      holdEnd(id);
      if (!animLocked) {
        playSnd('snd-bought');
        if (type === 'home') buyItem(id, true);
        else buyWorkItem(id, true);
      }
      // If animLocked, itemProgress stays at item.price for processBuyQueue retry
      return;
    }

    // Broke - pause progression but keep the glow on; user is still pressing
    if (money <= 0) return;

    // Deduct and progress
    const deduct = Math.min(money, Math.min(remaining, item.price * 0.02));
    money = Math.max(0, Math.round((money - deduct) * 100) / 100);
    itemProgress[String(id)] = Math.min(item.price, prog + deduct);
    updateMoney();

    // Update visuals — re-fetch elements each tick in case renderStore replaced them
    const key = String(id);
    const liveBar = document.getElementById('bar-' + key);
    if (liveBar) {
      liveBar.style.width = (itemProgress[key] / item.price * 100) + '%';
      // Re-apply glow if a re-render removed it
      if (!liveBar.classList.contains('active')) liveBar.classList.add('active');
    }
    const btn = document.getElementById('btn-' + key);
    if (btn) {
      const leftToPay = Math.max(0, item.price - itemProgress[key]);
      btn.textContent = leftToPay > 0 ? fmt(leftToPay) : '\u2713';
    }
  }, 50);
}

// Called whenever an animation ends - completes any items that were
// fully paid but couldn't buy because animLocked was true.
function processBuyQueue() {
  if (animLocked) return;
  for (let i = 0; i < ITEMS.length; i++) {
    const item = ITEMS[i];
    if (owned.includes(item.id)) continue;
    if ((itemProgress[String(item.id)] || 0) >= item.price) {
      playSnd('snd-bought');
      buyItem(item.id, true);
      return; // one at a time; buyItem starts new anim and will trigger this again on end
    }
  }
  for (let i = 0; i < WORK_ITEMS.length; i++) {
    const item = WORK_ITEMS[i];
    if (workOwned.map(String).includes(String(item.id))) continue;
    if ((itemProgress[String(item.id)] || 0) >= item.price) {
      playSnd('snd-bought');
      buyWorkItem(item.id, true);
      return;
    }
  }
}

function holdEnd(id) {
  if (holdIntervals[id]) { clearInterval(holdIntervals[id]); delete holdIntervals[id]; }
  const bar = document.getElementById('bar-' + id);
  if (bar) bar.classList.remove('active');
  try { const a = document.getElementById('snd-accumulate'); a.pause(); a.currentTime=0; } catch(e) {}
}

function updateMoney() {
  moneyEl.textContent = fmt(money);
  document.getElementById('store-bal-amt').textContent = fmt(money);
}

function updateNext() {} // removed - using status label instead

// ============================================
// BUY HOME ITEM
// ============================================
function buyItem(id, alreadyPaid) {
  id = isNaN(id) ? id : Number(id);
  const item = ITEMS.find(i => i.id === id || String(i.id) === String(id));
  if (!item || owned.includes(item.id) || animLocked) return;
  if (!alreadyPaid) {
    if (money < item.price) return;
    money -= item.price;
  }
  delete itemProgress[String(id)];
  owned.push(item.id);
  recalcWork(); // re-sum home income bonuses
  updateMoney();
  saveGame();
  setTab('home');
  playSnd('snd-item');

  // Hide item this replaces
  if (item.replaces) {
    const rep = document.getElementById(item.replaces);
    if (rep) rep.classList.remove('visible');
  }

  if (item.replaces) { const rep = document.getElementById(item.replaces); if (rep) rep.classList.remove('visible'); }
  if (!item.anim) {
    document.getElementById(item.el).classList.add('visible');
    return;
  }

  animLocked = true;
  animVid.style.zIndex = (item.id >= 14) ? '50' : '12';
  animVid.onended = null;
  animVid.src = item.anim;
  animVid.style.display = 'block';
  animVid.currentTime = 0;
  animVid.play().catch(() => {});
  animVid.onended = () => {
    requestAnimationFrame(() => {
      animVid.style.display = 'none';
      animVid.src = '';
      document.getElementById(item.el).classList.add('visible');
      animLocked = false;
      updateNext();
      if (tab === 'store') renderStore();
      processBuyQueue();
    });
  };
}

// ============================================
// BUY WORK ITEM
// ============================================
function buyWorkItem(id, alreadyPaid) {
  const item = WORK_ITEMS.find(i => String(i.id) === String(id));
  if (!item || workOwned.map(String).includes(String(id)) || animLocked) return;
  if (!alreadyPaid) {
    if (money < item.price) return;
    money -= item.price;
  }
  delete itemProgress[String(id)];
  workOwned.push(item.id);
  recalcWork();
  updateMoney();
  saveGame();
  setTab('work');
  playSnd('snd-item');

  if (item.anim) {
    animLocked = true;
    animVidW.style.display = 'block';
    animVidW.src = item.anim;
    animVidW.currentTime = 0;
    animVidW.play().catch(() => {});
    animVidW.onended = () => {
      requestAnimationFrame(() => {
        animVidW.style.display = 'none';
        animVidW.src = '';
        // Show item AFTER animation ends
        document.getElementById(item.el).classList.add('visible');
        animLocked = false;
        if (tab === 'store') renderStore();
        processBuyQueue();
      });
    };
  } else {
    document.getElementById(item.el).classList.add('visible');
  }
}

// ============================================
// STORE
// ============================================
function setStoreTab(t) {
  playSnd('snd-store-switch');
  storeTab = t;
  document.getElementById('stab-home').style.cssText = `flex:1;padding:7px;border-radius:8px;border:none;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer;background:${t==='home'?'var(--gold)':'rgba(255,255,255,0.08)'};color:${t==='home'?'#1A1410':'rgba(255,255,255,0.4)'}`;
  document.getElementById('stab-work').style.cssText = `flex:1;padding:7px;border-radius:8px;border:none;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer;background:${t==='work'?'var(--gold)':'rgba(255,255,255,0.08)'};color:${t==='work'?'#1A1410':'rgba(255,255,255,0.4)'}`;
  renderStore();
}

function renderStore() {
  const list = document.getElementById('store-list');

  if (storeTab === 'work') {
    const now = Date.now();
    const availableBoosts = BOOSTS.filter(b => !b.requires || workOwned.includes(b.requires));
    let boostHtml = '';
    if (availableBoosts.length) {
      boostHtml += '<div style="font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase;padding:12px 0 8px;">Boosts</div>';
      boostHtml += availableBoosts.map(boost => {
        const isActive = activeBoosts[boost.id] && now < activeBoosts[boost.id];
        const onCooldown = !isActive && boostCooldowns[boost.id] && now < boostCooldowns[boost.id];
        const canAfford = money >= boost.cost;
        const remActive = isActive ? Math.ceil((activeBoosts[boost.id] - now) / 1000) : 0;
        const remCooldown = onCooldown ? Math.ceil((boostCooldowns[boost.id] - now) / 1000) : 0;
        let btnText = fmt(boost.cost);
        let btnClass = canAfford && !onCooldown && !isActive ? '' : 'no';
        let btnDisabled = !canAfford || onCooldown || isActive;
        if (isActive) { btnText = '⚡ ' + fmtTime(remActive); btnClass = 'owned'; }
        else if (onCooldown) { btnText = fmtTime(remCooldown); }
        return '<div class="si"><div class="si-icon" style="font-size:26px;display:flex;align-items:center;justify-content:center;">' + boost.icon + '</div><div class="si-info"><div class="si-name">' + boost.name + '</div><div class="si-desc">' + boost.desc + '</div></div><button class="bbtn ' + btnClass + '" ' + (btnDisabled ? 'disabled' : '') + ' onclick="activateBoost(\'' + boost.id + '\')">' + btnText + '</button></div>';
      }).join('');
      boostHtml += '<div style="font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase;padding:16px 0 8px;">Items</div>';
    }
    const nextIdx = WORK_ITEMS.findIndex(i => !workOwned.includes(i.id));
    const show = new Set(workOwned);
    for (let i = 0; i < 4; i++) { if (nextIdx !== -1 && WORK_ITEMS[nextIdx+i]) show.add(WORK_ITEMS[nextIdx+i].id); }
    let html = WORK_ITEMS.filter(i => show.has(i.id)).map(item => {
      const isOwned = workOwned.includes(item.id);
      const can = money >= item.price;
      const bc = isOwned ? 'owned' : '';
      const prog2 = (itemProgress[String(item.id)] && itemProgress[String(item.id)] > 0) ? itemProgress[String(item.id)] : 0;
      const remaining2 = Math.max(0, item.price - prog2);
      const bt = isOwned ? '\u2713 Owned' : fmt(remaining2);
      const eff = item.passive > 0 ? '+' + fmt(item.passive) + '/min' : item.tap > 0 ? '+'+(item.tap*100)+'% tap' : '';
      const pct2 = item.price > 0 ? Math.min(100, prog2 / item.price * 100) : 0;
      return `<div class="si">
        <div class="si-icon">${isOwned ? `<img src="${item.icon}"/>` : '<span style="font-size:28px;color:rgba(232,201,122,0.4);">?</span>'}</div>
        <div class="si-info">
          <div class="si-name">${item.name}</div>
          ${isOwned ? `<div class="si-owned">${eff} — active</div>` : `<div class="si-desc">${item.flavor}<br><span style="color:var(--gold);font-size:11px;">${eff}</span></div>`}
          ${!isOwned ? `<div class="progress-wrap"><div class="progress-bar" id="bar-${item.id}" style="width:${pct2}%"></div></div>` : ''}
        </div>
        <button class="hold-btn ${bc}" id="btn-${item.id}" ${isOwned ? 'disabled' : ''}
          oncontextmenu="return false"
          onpointerdown="event.currentTarget.setPointerCapture(event.pointerId); holdStart('${item.id}','work')"
          onpointerup="holdEnd('${item.id}')"
          onpointercancel="holdEnd('${item.id}')"
        >${bt}</button>
      </div>`;
    }).join('');
    const hs = nextIdx !== -1 ? nextIdx+4 : WORK_ITEMS.length;
    WORK_ITEMS.slice(hs, hs+2).forEach(() => {
      html += `<div class="si mystery"><div class="si-icon" style="font-size:22px;color:rgba(232,201,122,0.3)">?</div><div class="si-info"><div class="si-name" style="color:rgba(232,201,122,0.4);font-style:italic">???</div><div class="si-desc">Keep building</div></div><div style="font-size:22px">\uD83D\uDD12</div></div>`;
    });
    list.innerHTML = boostHtml + html;
    return;
  }

  const nextIdx = ITEMS.findIndex(i => !owned.map(String).includes(String(i.id)));
  const show = new Set(owned.map(String));
  for (let i = 0; i < 4; i++) { if (nextIdx !== -1 && ITEMS[nextIdx+i]) show.add(String(ITEMS[nextIdx+i].id)); }
  let html = ITEMS.filter(i => show.has(String(i.id))).map(item => {
    const isOwned = owned.map(String).includes(String(item.id));
    const can = money >= item.price;
    const bc = isOwned ? 'owned' : '';
    const prog = (itemProgress[String(item.id)] && itemProgress[String(item.id)] > 0) ? itemProgress[String(item.id)] : 0;
    const remaining = Math.max(0, item.price - prog);
    const bt = isOwned ? '\u2713 Owned' : fmt(remaining);
    const progPct = item.price > 0 ? Math.min(100, prog / item.price * 100) : 0;
    return `<div class="si">
      <div class="si-icon">${isOwned ? `<img src="${item.icon}"/>` : '<span style="font-size:28px;color:rgba(232,201,122,0.4);">?</span>'}</div>
      <div class="si-info">
        <div class="si-name">${item.name}</div>
        ${isOwned ? '<div class="si-owned">In your room</div>' : `<div class="si-desc">${item.flavor}</div>`}
        ${!isOwned ? `<div class="progress-wrap"><div class="progress-bar" id="bar-${item.id}" style="width:${progPct}%"></div></div>` : ''}
      </div>
      <button class="hold-btn ${bc}" id="btn-${item.id}"
        ${isOwned ? 'disabled' : ''}
        oncontextmenu="return false"
        onpointerdown="event.currentTarget.setPointerCapture(event.pointerId); holdStart('${item.id}','home')" 
        onpointerup="holdEnd('${item.id}')" 
        onpointercancel="holdEnd('${item.id}')"
      >${bt}</button>
    </div>`;
  }).join('');

  const hs = nextIdx !== -1 ? nextIdx+4 : ITEMS.length;
  ITEMS.slice(hs, hs+2).forEach(() => {
    html += `<div class="si mystery"><div class="si-icon" style="font-size:22px;color:rgba(232,201,122,0.3)">?</div><div class="si-info"><div class="si-name" style="color:rgba(232,201,122,0.4);font-style:italic">???</div><div class="si-desc">Keep building</div></div><div style="font-size:22px">\uD83D\uDD12</div></div>`;
  });
  list.innerHTML = html;
}

setInterval(() => {
  recalcBoosts();
  // Skip re-render if any item is being held - otherwise the held button and
  // bar get destroyed and recreated, killing the glow and causing visual jumps
  if (tab === 'store' && storeTab === 'work' && Object.keys(holdIntervals).length === 0) {
    renderStore();
  }
}, 1000);

// ============================================
// TABS
// ============================================
let prevTab = 'work';

function setTab(t) {
  prevTab = tab;
  tab = t;
  const isStore = t === 'store';
  const isWork  = t === 'work';
  const isHome  = t === 'home';

  // Home and work screens — swap only when not going to store
  if (!isStore) {
    document.getElementById('home-screen').style.display = isWork ? 'none' : 'block';
    document.getElementById('work-screen').style.display = isWork ? 'block' : 'none';
  }

  // Store — show/hide with slide from correct direction
  const storeEl = document.getElementById('store');
  if (isStore) {
    storeEl.style.display = 'flex';
    storeEl.style.transition = 'none';
    storeEl.style.transform = prevTab === 'work' ? 'translateX(-100%)' : 'translateX(100%)';
    requestAnimationFrame(() => {
      storeEl.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
      storeEl.style.transform = 'translateX(0)';
    });
  } else {
    storeEl.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
    storeEl.style.transform = tab === 'work' ? 'translateX(-100%)' : 'translateX(100%)';
    setTimeout(() => { storeEl.style.display = 'none'; }, 300);
  }

  // Work character
  if (!isWork) {
    if (typingTimer) clearTimeout(typingTimer);
    isTyping = false;
    workSleep.style.display = 'block';
    workType.style.display = 'none';
  }

  // Update status label based on tab
  const statusEl = document.getElementById('status-label');
  if (statusEl) {
    if (isWork) statusEl.textContent = 'Intern';
    else if (isHome) statusEl.textContent = 'One Bedroom Apartment';
  }

  // HUD
  document.getElementById('hud').style.opacity = isStore ? '0' : '1';
  const devBtn = document.getElementById('dev-reset-btn');
  if (devBtn) devBtn.style.display = isStore ? 'none' : 'block';

  if (isStore) renderStore();
}

document.getElementById('tab-home').addEventListener('click', () => { playSnd('snd-tab'); setTab('home'); });
document.getElementById('tab-store').addEventListener('click', () => { playSnd('snd-tab'); setTab('store'); });
document.getElementById('tab-work').addEventListener('click', () => { playSnd('snd-tab'); setTab('work'); });

// ============================================
// WORK CHARACTER
// ============================================
function startTyping() {
  if (!isTyping) {
    isTyping = true;
    workSleep.style.display = 'none';
    workType.style.display = 'block';
  }
  if (typingTimer) clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {
    isTyping = false;
    workSleep.style.display = 'block';
    workType.style.display = 'none';
  }, 800);
}

// ============================================
// SOUNDS
// ============================================
function playSnd(id) {
  try { const a = document.getElementById(id); a.currentTime = 0; a.play().catch(() => {}); } catch(e) {}
}
function playTap() {
  try { const pool = document.querySelectorAll('.tap-snd'); const a = pool[tapIdx++ % pool.length]; a.currentTime = 0; a.play().catch(() => {}); } catch(e) {}
}

// ============================================
// EARN
// ============================================
let prevMoney = 0;
const BASE_TAP = 1.00;
const TAP_PASSIVE_SHARE = 0.05; // each tap is worth BASE_TAP + 5% of passive/min
function earn(x, y) {
  const before = money;
  const passiveContribution = passivePerMin * TAP_PASSIVE_SHARE;
  const tapValue = (BASE_TAP + passiveContribution) * tapMultiplier * boostTapMult * (1 + homeIncomeBonus);
  money = Math.round((money + tapValue) * 100) / 100;
  updateMoney();
  ITEMS.forEach(item => {
    
  });

  moneyEl.classList.remove('bump'); void moneyEl.offsetWidth; moneyEl.classList.add('bump');
  setTimeout(() => moneyEl.classList.remove('bump'), 100);

  const r = document.createElement('div'); r.className = 'ripple';
  r.style.left = x + 'px'; r.style.top = y + 'px';
  document.getElementById('game').appendChild(r); setTimeout(() => r.remove(), 600);

  // Tier the floating coin visually so big taps feel big
  // Tier 0: under $100, normal. Tier 4: $1M+, huge with intense glow
  const tier = Math.min(4, Math.floor(Math.log10(Math.max(10, tapValue)) / 2));
  const lifetime = 1000 + tier * 200; // higher tiers linger longer
  const f = document.createElement('div');
  f.className = 'fcoin fcoin-tier-' + tier;
  f.textContent = '+' + fmt(tapValue);
  f.style.left = (x-20) + 'px'; f.style.top = (y-40) + 'px';
  document.getElementById('game').appendChild(f);
  setTimeout(() => f.remove(), lifetime);

  playTap();
  if (tab === 'work') startTyping();
}

// ============================================
// TOUCH — tap on work screen only
// ============================================
document.getElementById('work-screen').addEventListener('touchstart', e => {
  if (tab !== 'work') return;
  e.preventDefault();
  const rect = document.getElementById('game').getBoundingClientRect();
  // Process ALL touch points — fixes Samsung palm rejection dropping taps
  Array.from(e.changedTouches).forEach(t => {
    earn(t.clientX - rect.left, t.clientY - rect.top);
  });
}, { passive: false });

document.getElementById('work-screen').addEventListener('click', e => {
  if (tab !== 'work') return;
  const rect = document.getElementById('game').getBoundingClientRect();
  earn(e.clientX - rect.left, e.clientY - rect.top);
});

// ============================================
// INIT
// ============================================
const loaded = loadGame();
updateMoney();
updateNext();
// If we restored a saved tab that isn't the default, switch to it
if (loaded && tab !== 'work') {
  setTab(tab);
}
</script>
