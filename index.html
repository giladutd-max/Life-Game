<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Build Your Life</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
:root { --gold:#E8C97A; --gold-dark:#B8963A; --dark:#1A1410; }
body { background:#0d0d0d; font-family:'DM Sans',sans-serif; overflow:hidden; }
#game { width:100vw; height:100vh; height:100dvh; position:relative; overflow:hidden; }

/* ROOM */
#room { position:absolute; inset:0; }
.bg { position:absolute; inset:0; object-fit:cover; width:100%; height:100%; }
#bg-home { z-index:1; }
#bg-work { z-index:1; display:none; }

/* HOME ITEMS */
.room-item { position:absolute; inset:0; object-fit:cover; width:100%; height:100%; pointer-events:none; opacity:0; }
.room-item.visible { opacity:1; }

/* WORK CHARACTERS */
#work-sleep { position:absolute; inset:0; object-fit:cover; width:100%; height:100%; pointer-events:none; z-index:20; display:none; }
#work-type  { position:absolute; inset:0; object-fit:cover; width:100%; height:100%; pointer-events:none; z-index:20; display:none; }

/* ANIMATION VIDEO */
#anim-video { position:absolute; inset:0; object-fit:cover; width:100%; height:100%; pointer-events:none; z-index:50; display:none; }

/* HUD */
#hud { position:absolute; top:0; left:0; right:0; padding:20px 24px; display:flex; justify-content:space-between; z-index:100; pointer-events:none; }
#money-label { font-size:11px; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:#2d5a27; }
#money-amount { font-family:'Bebas Neue',sans-serif; font-size:40px; color:#2d5a27; line-height:1; }
#money-amount.bump { transform:scale(1.15); transition:transform 0.05s; }
#next-label { font-size:11px; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:#2d5a27; text-align:right; }
#next-name { font-size:15px; font-weight:700; color:#2d5a27; text-align:right; }
#next-name.can-afford { animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* RIPPLE & FLOAT */
.ripple { position:absolute; border-radius:50%; background:radial-gradient(circle,rgba(232,201,122,0.5),transparent 70%); pointer-events:none; animation:rout 0.6s ease-out forwards; transform:translate(-50%,-50%); z-index:60; }
@keyframes rout { 0%{width:0;height:0;opacity:1} 100%{width:120px;height:120px;opacity:0} }
.fcoin { position:absolute; font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--gold); pointer-events:none; animation:fup 1s ease-out forwards; z-index:60; text-shadow:0 0 16px rgba(232,201,122,1); }
@keyframes fup { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-80px)} }

/* TABS */
#tabs { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); display:flex; gap:16px; z-index:200; }
.tab { width:70px; height:70px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.tab img { width:100%; height:100%; object-fit:contain; }

/* STORE */
#store { position:absolute; inset:0; z-index:150; background:rgba(10,6,2,0.97); display:flex; flex-direction:column; transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); transform:translateX(100%); }
#store.open { transform:translateX(0) !important; }
#store.from-work { transform:translateX(-100%); }
#store-head { padding:52px 24px 16px; border-bottom:1px solid rgba(255,255,255,0.06); }
#store-title { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--gold); letter-spacing:2px; }
#store-bal { font-size:13px; color:rgba(255,255,255,0.5); margin-top:4px; }
#store-bal span { color:var(--gold); font-weight:600; }
#store-tab-btns { display:flex; gap:8px; margin-top:12px; }
#store-tab-btns button { flex:1; padding:8px; border-radius:10px; border:none; font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:1px; cursor:pointer; }
#store-list { flex:1; overflow-y:auto; padding:16px 24px 120px; }
.si { display:flex; align-items:center; gap:16px; padding:16px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
.si-icon { width:56px; height:56px; background:rgba(232,201,122,0.08); border-radius:14px; border:1px solid rgba(232,201,122,0.15); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.si-icon img { width:100%; height:100%; object-fit:contain; }
.si-info { flex:1; }
.si-name { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--gold); letter-spacing:1px; }
.si-desc { font-size:11px; color:rgba(255,255,255,0.4); margin-top:2px; }
.si-owned { font-size:11px; color:rgba(232,201,122,0.5); margin-top:2px; font-style:italic; }
.bbtn { flex-shrink:0; background:linear-gradient(135deg,var(--gold-dark),var(--gold)); border:none; border-radius:12px; padding:10px 14px; font-family:'Bebas Neue',sans-serif; font-size:15px; color:var(--dark); cursor:pointer; letter-spacing:1px; }
.bbtn.no { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.3); cursor:default; }
.bbtn.owned { background:rgba(232,201,122,0.1); color:rgba(232,201,122,0.4); cursor:default; font-size:12px; }
.mystery { opacity:0.4; pointer-events:none; }
.soon { text-align:center; color:rgba(255,255,255,0.3); font-size:14px; margin-top:80px; }

/* AUDIO hidden */
audio { display:none; }
</style>
</head>
<body>
<div id="game">
  <div id="room">
    <img id="bg-home" class="bg" src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778611541/HOME_CLEAN_gzbpl3.jpg" />
    <img id="bg-work" class="bg" src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778657550/Work_Clean_n81ta7.jpg" />

    <!-- HOME ITEMS z1-z16 -->
    <img id="item-clock"         class="room-item" style="z-index:1"  src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/Clock_thciwf.png" />
    <img id="item-poster"        class="room-item" style="z-index:2"  src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778615568/Poster_s7ntxc.png" />
    <img id="item-curtains"      class="room-item" style="z-index:3"  src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/Curtains_wg66ly.png" />
    <img id="item-tvdesk"        class="room-item" style="z-index:4"  src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778611446/Tv_Desk_oawvom.png" />
    <img id="item-tv"            class="room-item" style="z-index:5"  src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/TV_zaylil.png" />
    <img id="item-mattress"      class="room-item" style="z-index:6"  src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778611447/Mattress_blodid.png" />
    <img id="item-mattresscover" class="room-item" style="z-index:7"  src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778611447/Matress_cover_e4wxba.png" />
    <img id="item-rug"           class="room-item" style="z-index:8"  src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/Rug_kcsylw.png" />
    <img id="item-table"         class="room-item" style="z-index:9"  src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/Table_gsyqnd.png" />
    <img id="item-lamp"          class="room-item" style="z-index:10" src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778611446/Lamp_bfrmwb.png" />
    <img id="item-plant"         class="room-item" style="z-index:11" src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778611447/Plant_ivdhpv.png" />
    <img id="item-bicycle"       class="room-item" style="z-index:12" src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778611446/Bicycle_o45kwz.png" />
    <img id="item-chair"         class="room-item" style="z-index:13" src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/Chair_smvy1g.png" />
    <img id="item-workdesk"      class="room-item" style="z-index:15" src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778611446/Work_Desk_lgmwck.png" />
    <img id="item-pcchair"       class="room-item" style="z-index:16" src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778611447/PC_Chair_undbbu.png" />

    <!-- WORK CHARACTERS -->
    <img id="work-sleep" src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778662719/4_i9nx7w.png" />
    <img id="work-type"  src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778662711/2_kq0v8d.png" />

    <!-- ANIMATION VIDEO -->
    <video id="anim-video" playsinline muted></video>

    <!-- AUDIO -->
    <audio id="snd-highlight" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778178637/SFX_highlite_m0lprc.mp3" preload="auto"></audio>
    <audio id="snd-tab"       src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778177913/SFX_TABS_m1stso.mp3" preload="auto"></audio>
    <audio id="snd-item"      src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778179264/item_sfx_nzc9tp.mp3" preload="auto"></audio>
    <audio class="tap-snd" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145018/tap_sfx_p5tqww.mp3" preload="auto"></audio>
    <audio class="tap-snd" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145018/tap_sfx_p5tqww.mp3" preload="auto"></audio>
    <audio class="tap-snd" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145018/tap_sfx_p5tqww.mp3" preload="auto"></audio>
    <audio class="tap-snd" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145018/tap_sfx_p5tqww.mp3" preload="auto"></audio>
    <audio class="tap-snd" src="https://res.cloudinary.com/dkzii40qr/video/upload/v1778145018/tap_sfx_p5tqww.mp3" preload="auto"></audio>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div>
      <div id="money-label">Money</div>
      <div id="money-amount">$0.00</div>
    </div>
    <div>
      <div id="next-label">Next Item</div>
      <div id="next-name"></div>
    </div>
  </div>

  <!-- TABS -->
  <div id="tabs">
    <div class="tab" id="tab-home"><img src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778176444/HOME_y266jv.png" /></div>
    <div class="tab" id="tab-store"><img src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778176444/STORE_fr3fkp.png" /></div>
    <div class="tab" id="tab-work"><img src="https://res.cloudinary.com/dkzii40qr/image/upload/v1778658291/Work_nlwpee.png" /></div>
  </div>

  <!-- STORE -->
  <div id="store">
    <div id="store-head">
      <div id="store-title">Store</div>
      <div id="store-bal">Balance: <span id="store-bal-amt">$0.00</span></div>
      <div id="store-tab-btns">
        <button id="stab-home" onclick="setStoreTab('home')" style="background:var(--gold);color:#1A1410;">HOME</button>
        <button id="stab-work" onclick="setStoreTab('work')" style="background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);">WORK</button>
      </div>

    <div id="store-list"></div>

</div>

<script>
// ============================================
// ITEMS
// ============================================
const ITEMS = [
  { id:1,  name:'Flea Market Rug',  price:5,  el:'item-rug',          anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617404/Rug_euleyk.webm',        icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/Rug_kcsylw.png',           flavor:'The man said it belonged to a Turkish prince. I highly doubt that.' },
  { id:2,  name:'Wooden Chair',     price:10, el:'item-chair',        anim:null,                                                                                    icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/Chair_smvy1g.png',         flavor:'My grandad used to say a chair is a man\u2019s best friend.' },
  { id:3,  name:'Dirty Mattress',   price:15, el:'item-mattress',     anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617403/Matress_ay4eqe.webm',    icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611447/Mattress_blodid.png',      flavor:'The previous tenant left it. He didn\u2019t ask why.' },
  { id:4,  name:'Plant',            price:20, el:'item-plant',        anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617404/Plant_mdjezk.webm',      icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611447/Plant_ivdhpv.png',         flavor:'It\u2019s pretty and it can\u2019t die. Just what I need.' },
  { id:5,  name:'Lamp',             price:25, el:'item-lamp',         anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617404/Lamp_jkag03.webm',       icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611446/Lamp_bfrmwb.png',          flavor:'Let there be light. Decent light.' },
  { id:6,  name:'Poster',           price:30, el:'item-poster',       anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617404/Poster_rkaglj.webm',     icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778615568/Poster_s7ntxc.png',        flavor:'Inspiration costs nothing. This cost five dollars.' },
  { id:7,  name:'Bed Sheets',       price:35, el:'item-mattresscover',anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617403/Bed_Sheets_lobhbr.webm', icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611447/Matress_cover_e4wxba.png', flavor:'Clean sheets. Small win. Still counts.' },
  { id:8,  name:'Wall Clock',       price:40, el:'item-clock',        anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617403/Clock_kor6d5.webm',      icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/Clock_thciwf.png',         flavor:'Time is passing. Might as well know how much.' },
  { id:9,  name:'Coffee Table',     price:45, el:'item-table',        anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617405/Table_gljcgx.webm',      icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/Table_gsyqnd.png',         flavor:'A surface. Finally a surface.' },
  { id:10, name:'Curtains',         price:50, el:'item-curtains',     anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617404/Curtains_c5rjoc.webm',   icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/Curtains_wg66ly.png',      flavor:'Finally. Some privacy.' },
  { id:11, name:'Bicycle',          price:55, el:'item-bicycle',      anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617403/Bicycle_renrkg.webm',    icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611446/Bicycle_o45kwz.png',       flavor:'No car yet. But he\u2019s moving.' },
  { id:12, name:'TV Desk',          price:60, el:'item-tvdesk',       anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617405/TV_Desk_h7p2n5.webm',    icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611446/Tv_Desk_oawvom.png',       flavor:'Somewhere to put the TV. When he gets one.' },
  { id:13, name:'Old TV',           price:65, el:'item-tv',           anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617405/TV_pkofmb.webm',         icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611445/TV_zaylil.png',            flavor:'Three channels. One of them is static. He loves it.' },
  { id:14, name:'Work Desk',        price:70, el:'item-workdesk',     anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617405/Work_Desk_kwgi9v.webm',  icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611446/Work_Desk_lgmwck.png',     flavor:'This is where it starts. For real this time.' },
  { id:15, name:'PC Chair',         price:75, el:'item-pcchair',      anim:'https://res.cloudinary.com/dkzii40qr/video/upload/v1778617403/Pc_Chair_qpvsdj.webm',  icon:'https://res.cloudinary.com/dkzii40qr/image/upload/v1778611447/PC_Chair_undbbu.png',      flavor:'Lumbar support. He\u2019s serious now.' },
];

// Preload anims
ITEMS.forEach(item => {
  if (!item.anim) return;
  const v = document.createElement('video');
  v.src = item.anim; v.preload = 'auto'; v.muted = true; v.style.display = 'none';
  document.body.appendChild(v);
});

// ============================================
// STATE
// ============================================
let money = 0;
let owned = [];
let tab = 'home'; // current tab
let storeTab = 'home';
let animLocked = false;
let typingTimer = null;
let isTyping = false;
let tapIdx = 0;

const moneyEl   = document.getElementById('money-amount');
const nextEl    = document.getElementById('next-name');
const animVid   = document.getElementById('anim-video');
const workSleep = document.getElementById('work-sleep');
const workType  = document.getElementById('work-type');

// ============================================
// MONEY
// ============================================
function fmt(n) { return '$' + n.toFixed(2); }

function updateMoney() {
  moneyEl.textContent = fmt(money);
  document.getElementById('store-bal-amt').textContent = fmt(money);
}

function updateNext() {
  const unowned = ITEMS.filter(i => !owned.includes(i.id));
  if (!unowned.length) { nextEl.textContent = 'Complete!'; nextEl.classList.remove('can-afford'); return; }
  const affordable = unowned.filter(i => money >= i.price);
  const next = affordable.length ? affordable[affordable.length - 1] : unowned[0];
  nextEl.textContent = next.name + ' \u00B7 ' + fmt(next.price);
  affordable.length ? nextEl.classList.add('can-afford') : nextEl.classList.remove('can-afford');
}

// ============================================
// BUY
// ============================================
function buyItem(id) {
  const item = ITEMS.find(i => i.id === id);
  if (!item || owned.includes(id) || money < item.price || animLocked) return;
  money -= item.price;
  owned.push(id);
  updateMoney();
  setTab('home');
  playSnd('snd-item');

  if (!item.anim) {
    document.getElementById(item.el).classList.add('visible');
    updateNext();
    return;
  }

  animLocked = true;
  animVid.style.zIndex = (item.id >= 14) ? '50' : '12';
  animVid.onended = null;
  animVid.src = item.anim;
  animVid.style.display = 'block';
  animVid.currentTime = 0;
  animVid.play().catch(() => {});
  animVid.onended = () => {
    requestAnimationFrame(() => {
      animVid.style.display = 'none';
      animVid.src = '';
      document.getElementById(item.el).classList.add('visible');
      animLocked = false;
      updateNext();
      if (tab === 'store') renderStore();
    });
  };
}

// ============================================
// STORE
// ============================================
function setStoreTab(t) {
  storeTab = t;
  document.getElementById('stab-home').style.cssText = t === 'home' ? 'background:var(--gold);color:#1A1410;flex:1;padding:8px;border-radius:10px;border:none;font-family:Bebas Neue,sans-serif;font-size:16px;letter-spacing:1px;cursor:pointer;' : 'background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);flex:1;padding:8px;border-radius:10px;border:none;font-family:Bebas Neue,sans-serif;font-size:16px;letter-spacing:1px;cursor:pointer;';
  document.getElementById('stab-work').style.cssText = t === 'work' ? 'background:var(--gold);color:#1A1410;flex:1;padding:8px;border-radius:10px;border:none;font-family:Bebas Neue,sans-serif;font-size:16px;letter-spacing:1px;cursor:pointer;' : 'background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);flex:1;padding:8px;border-radius:10px;border:none;font-family:Bebas Neue,sans-serif;font-size:16px;letter-spacing:1px;cursor:pointer;';
  renderStore();
}

function renderStore() {
  const list = document.getElementById('store-list');
  if (storeTab === 'work') { list.innerHTML = '<div class="soon">Work items coming soon.</div>'; return; }
  const nextIdx = ITEMS.findIndex(i => !owned.includes(i.id));
  const show = new Set(owned);
  for (let i = 0; i < 4; i++) { if (nextIdx !== -1 && ITEMS[nextIdx+i]) show.add(ITEMS[nextIdx+i].id); }
  let html = ITEMS.filter(i => show.has(i.id)).map(item => {
    const isOwned = owned.includes(item.id);
    const can = money >= item.price;
    const bc = isOwned ? 'owned' : can ? '' : 'no';
    const bt = isOwned ? '\u2713 Owned' : fmt(item.price);
    return `<div class="si">
      <div class="si-icon"><img src="${item.icon}"/></div>
      <div class="si-info">
        <div class="si-name">${item.name}</div>
        ${isOwned ? '<div class="si-owned">In your room</div>' : '<div class="si-desc">'+item.flavor+'</div>'}
      </div>
      <button class="bbtn ${bc}" ${isOwned||!can?'disabled':''} onclick="buyItem(${item.id})">${bt}</button>
    </div>`;
  }).join('');
  const hs = nextIdx !== -1 ? nextIdx+4 : ITEMS.length;
  ITEMS.slice(hs, hs+2).forEach(() => {
    html += `<div class="si mystery">
      <div class="si-icon" style="font-size:22px;color:rgba(232,201,122,0.3)">?</div>
      <div class="si-info"><div class="si-name" style="color:rgba(232,201,122,0.4);font-style:italic">???</div><div class="si-desc">Keep building</div></div>
      <div style="font-size:22px">\uD83D\uDD12</div>
    </div>`;
  });
  list.innerHTML = html;
}

// ============================================
// TABS
// ============================================
const TABS = ['home', 'store', 'work'];

function setTab(t) {
  const prevTab = tab;
  tab = t;
  const isWork  = t === 'work';
  const isStore = t === 'store';
  const isHome  = t === 'home';

  // Backgrounds
  document.getElementById('bg-home').style.display = isWork ? 'none' : 'block';
  document.getElementById('bg-work').style.display = isWork ? 'block' : 'none';

  // Home items
  document.querySelectorAll('.room-item').forEach(el => el.style.visibility = isWork ? 'hidden' : 'visible');

  // Work characters
  if (isWork) {
    workSleep.style.display = 'block';
    workType.style.display = 'none';
  } else {
    workSleep.style.display = 'none';
    workType.style.display = 'none';
    if (typingTimer) clearTimeout(typingTimer);
    isTyping = false;
  }

  // Store — slide from correct direction
  const storeEl = document.getElementById('store');
  if (isStore) {
    // Coming from work = store is to the left of work = slide in from left
    if (prevTab === 'work') {
      storeEl.classList.remove('open');
      storeEl.classList.add('from-work');
      requestAnimationFrame(() => requestAnimationFrame(() => storeEl.classList.add('open')));
    } else {
      storeEl.classList.remove('from-work');
      storeEl.classList.add('open');
    }
  } else {
    storeEl.classList.remove('open');
    // Slide out to left if going to work, right if going to home
    if (t === 'work') storeEl.classList.add('from-work');
    else storeEl.classList.remove('from-work');
  }

  // HUD
  document.getElementById('hud').style.opacity = isStore ? '0' : '1';

  if (isStore) renderStore();
}

// Tab button clicks
document.getElementById('tab-home').addEventListener('click', () => { playSnd('snd-tab'); setTab('home'); });
document.getElementById('tab-store').addEventListener('click', () => { playSnd('snd-tab'); setTab('store'); });
document.getElementById('tab-work').addEventListener('click', () => { playSnd('snd-tab'); setTab('work'); });

// ============================================
// WORK CHARACTER
// ============================================
let typeShowTimer = null;

function startTyping() {
  // Cancel any pending stop
  if (typingTimer) clearTimeout(typingTimer);
  // Delay showing typing image — gives swipe detection time to cancel
  if (typeShowTimer) clearTimeout(typeShowTimer);
  typeShowTimer = setTimeout(() => {
    if (tab !== 'work') return; // aborted by swipe
    isTyping = true;
    workSleep.style.display = 'none';
    workType.style.display = 'block';
    typingTimer = setTimeout(stopTyping, 800);
  }, 60);
}

function stopTyping() {
  isTyping = false;
  workSleep.style.display = 'block';
  workType.style.display = 'none';
}

// ============================================
// SOUNDS
// ============================================
function playSnd(id) {
  try { const a = document.getElementById(id); a.currentTime = 0; a.play().catch(() => {}); } catch(e) {}
}
function playTap() {
  try { const pool = document.querySelectorAll('.tap-snd'); const a = pool[tapIdx++ % pool.length]; a.currentTime = 0; a.play().catch(() => {}); } catch(e) {}
}

// ============================================
// EARN MONEY
// ============================================
let prevMoney = 0;
function earn(x, y) {
  const before = money;
  money = Math.round((money + 0.1) * 100) / 100;
  updateMoney();
  updateNext();

  // Price threshold SFX
  ITEMS.forEach(item => {
    if (!owned.includes(item.id) && before < item.price && money >= item.price) playSnd('snd-highlight');
  });

  moneyEl.classList.remove('bump'); void moneyEl.offsetWidth; moneyEl.classList.add('bump');
  setTimeout(() => moneyEl.classList.remove('bump'), 100);

  const r = document.createElement('div'); r.className = 'ripple';
  r.style.left = x + 'px'; r.style.top = y + 'px';
  document.getElementById('game').appendChild(r); setTimeout(() => r.remove(), 600);

  const f = document.createElement('div'); f.className = 'fcoin'; f.textContent = '+$0.10';
  f.style.left = (x-20) + 'px'; f.style.top = (y-40) + 'px';
  document.getElementById('game').appendChild(f); setTimeout(() => f.remove(), 1000);

  playTap();
  if (tab === 'work') startTyping();
}

// ============================================
// TOUCH — clean separation
// Game handles swipe (single finger, horizontal)
// Room handles tap (any finger count)
// ============================================
let swipeStartX = 0;
let swipeStartY = 0;
let swipeActive = false; // true when single finger is down for potential swipe

// Track single-finger gestures for swipe
document.getElementById('game').addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
    swipeActive = true;
  } else {
    swipeActive = false; // multi-finger cancels swipe
  }
}, { passive: true });

document.getElementById('game').addEventListener('touchmove', e => {
  if (!swipeActive || e.touches.length !== 1) { swipeActive = false; return; }
}, { passive: true });

document.getElementById('game').addEventListener('touchend', e => {
  if (!swipeActive) return;
  swipeActive = false;
  if (e.touches.length > 0) return; // more fingers still down

  const dx = e.changedTouches[0].clientX - swipeStartX;
  const dy = e.changedTouches[0].clientY - swipeStartY;

  // Must be clearly horizontal and long enough
  if (Math.abs(dx) >= 60 && Math.abs(dx) > Math.abs(dy) * 2) {
    // Undo money earned from the touchstart that began this swipe
    money = Math.max(0, Math.round((money - 0.1) * 100) / 100);
    updateMoney();
    updateNext();
    // Cancel typing — including the pending show timer
    if (typeShowTimer) clearTimeout(typeShowTimer);
    if (typingTimer) clearTimeout(typingTimer);
    stopTyping();
    const idx = TABS.indexOf(tab);
    if (dx < 0 && idx < TABS.length - 1) setTab(TABS[idx + 1]);
    else if (dx > 0 && idx > 0) setTab(TABS[idx - 1]);
  }
}, { passive: true });

// Tap — fires on touchstart for instant money
// Character switch is delayed 60ms so swipe can cancel it
document.getElementById('room').addEventListener('touchstart', e => {
  if (tab !== 'work') return;
  e.preventDefault();
  const rect = document.getElementById('game').getBoundingClientRect();
  const t = e.touches[0];
  earn(t.clientX - rect.left, t.clientY - rect.top);
}, { passive: false });

// ============================================
// INIT
// ============================================
updateMoney();
updateNext();
</script>
